body:
  text: 嗣法門人常靜實學編住雪寶頂雪山禪寺受松潘鎮臺周大護法期主周四護法率闔鎮文武縉紳士庶人等公啓請住雪山禪院山門萬古叢林勝境十方廣大法門續頭陀到來信步直入要且住拄杖放伊不過遂敲門三下便入韋馱不違本誓現將軍身十方感化雪嶺中興佛殿老瞿曇雄身遍剎續上座遍剎雄身以臥具拂一拂云世事但將公道斷夜深燈月兩相宜據室魔宮虎穴劍樹刀林山僧於此開單展鉢點人天之正眼斷衲子之命根且道利害在甚麼處震威一喝云頂門著錐開爐上堂指座云三世諸佛向這裏轉大法輪歷代祖師向這裏傳持祖道山僧到來又作麼生喝一喝云不入驚人浪難逢稱意魚便登拈香云此瓣香根深幹老歲古時新不作窮年凋卸豈隨空劫變遷信手拈來爇向爐中祝延今上皇帝聖躬萬歲萬歲萬萬歲伏願帝基永固佛日長明再拈云此瓣香朕兆未生身光托於虛映遍界靈明體妙絶於蹁躚拈向爐中恭祝鎮臺周大護法期主四護法及闔鎮文武縉紳士庶伏願永作皇家柱石同明般若正因次拈香云此瓣香自昭覺爐頭識得懷來數十餘年不曾動著一毫今對人天衆前豈敢被蓋囊藏此是第三回拈出供養成都府威鳳山昭覺堂上傳臨濟正宗第三十三世本師佛冤老和尚用酬法乳之恩斂衣就座上首白椎云法筵龍象衆當觀第一義師云山僧粗糙不會禪憑拈白棒打人天衆中若有英伶客出衆分明試道看有麼有麼問十方坐斷大地平沉和尚今日開堂且道承誰恩力師云光映大千遮不住更無毫髮影追尋進云靈山單傳直指曹溪嫡嗣正音今開人天正眼將何佛法示人師卓拄杖云只有這個進云十方無影相三界絶形蹤不墮往來機不住中間意且道在甚麼處師云闍黎腳跟下薦取問法鼓頻撾大衆臨筵結制升堂即不問祗如三聖道我逢人即不出出則不為人且道意旨如何師云恰進云興化道我逢即不出出則便為人師云曲進云即今逢人即出還有為人處也無師云有進云那裏是為人處師云一棒一條痕進云恁麼則太白門庭從此播滹陀法道又重興師云荊山須隱玉幾個遇良知問岑樓殿閣沖霄漢承誰恩力師云與汝道破了也進云法席重新光八表儼然兜率一重天師云眼花不少進云峰頭不用栽荊棘也要門前壯可觀師卓拄杖云少這個不得問懸崖應瑞麗法筵十方龍象共交參爐鞴弘開即不問三玄三要請師宣如何是第一玄師云須彌頂上撑鐵船進云如何是第二玄師云泥牛吞卻玉欄杆進云如何是第三玄師云伸手摘下月一團進云如何是第一要師云燈籠露柱解𨁝跳進云如何是第二要師云頭寒戴暖帽進云如何是第三要師云身寒向誰告進云三玄三要蒙師指正令全提是若何師云令不虛行乃云雪嶺巍峨迥碧天到來佛祖也顢頇憑拈拄杖撑宇宙攪落天邊月一團所以道法不孤啓仗境方生道不虛行遇緣即應作麼生是遇緣即應底事以手作拍云孤掌不浪鳴兩手鳴摑摑賴我大護法周鎮臺及闔鎮文武縉紳兵民士庶不昧靈山咐囑開建雪山聖境寶殿輝煌林巒育秀落成勝舉敦請山僧主持法席既到這裏只得揚下鈯斧子脫卻破草鞋於斯建立天童宗旨闡揚昭覺門庭現大人境界不被諸方檢點且道作麼生是大人境界莫是登寶王座大闡宗風麼莫是喝佛罵祖説黃道黑麼莫是闡臨濟之大道破野狐之窠窟麼莫是大開爐鞴斷衲子之命根麼恁麼不恁麼總沒交涉畢竟作麼生得卓拄杖云自從舞得三台後拍拍元來總是歌舉雙桂師祖上堂云破山喫了曹山酒醉得通身都是口瞎禿光兒罵上天又拈白棒打顛狗真續今日有一偈也要諸人著些精彩摸著雪山腸肚竹峰喫了破山酒西來祖意懶出口七尺烏藤任縱橫何須更喚子湖狗大衆若向這裏薦得許汝諸人相會破祖則易要會雪山老漢則難復結槌云諦觀法王法法王法如是受門人洪轉通智上堂一聲寒雁度中天驚起迷人著眼看識得根原歸去也何須陸地浪滔天伶俐衲僧向這裏進一步則紅爐飛片雪退一步則失卻手中珠到這裏不顧危亡放下身心向佛未出世祖未西來威音那邊那邊更那邊看是個甚麼乾屎橛臭來臭去臭到大安樂境界方許少分相應脫或依稀猶欠粥飯氣在今日或有人問昭覺是甚麼乾屎橛臭對他道萬古碧潭空界月再三撈摝始應知松漳陳護法率紳襟士庶入山營齋請上堂師以拄杖卓一卓云登寶王座行摩竭令發一言雷轟電掃用臨濟喝拈德山棒吐一語塞滿乾坤使三世諸佛歷代祖師天下老和尚到來截舌有分且道續上座有甚麼長處便用恁麼説話顧衆云雕弓已挂狼煙息萬國來朝賀太平謝期主周鎮臺上堂舉東坡學士訪佛印禪師才進方丈印云此間無坐處坡云借師四大作禪床印云老僧有一問道得即坐道不得即輸腰間玉帶坡即解帶至案云請問印云老僧四大本空五蘊非有汝向甚麼處坐坡無語印召侍者留下玉帶永鎮山門師云東坡秪知錐頭利未見鑿頭方佛印恁麼問也是眼空四海未免笑煞傍觀檢點將來兩家干戈不息何似鎮臺大護法為法心勤開闢岷山維新樓閣莊嚴佛像弘開期會功果圓成今日戎車幸臨山僧交以道接以禮不動干戈而名揚四海不垂一問而澤沛殊方且道與東坡是同是別雲佩遠山千點翠水和明月一天秋解制上堂安禪結制上古遺風暑往寒來四時遷變驀拈拄杖云這個木上座也無解結豈屬變遷動靜一如理事無礙猶如明鏡當臺光耀萬象天不能蓋地不能載無古無今縱橫無礙無非本有風光諸人若向這裏會得何必南嶽天台觀山玩水覽勝登奇人人腳跟下各有一段光明何不直下會去還委悉麼脫或未然山僧今日不惜眉毛全借拄杖子與諸人通個消息去也遂攛下拄杖云切忌動著咦常鳳吳居士率衆商等辦齋請上堂舉石鞏和尚昔為獵人因逐鹿從馬祖庵前過祖乃逆之師遂問還見鹿過否祖曰汝是何人曰獵者祖曰汝解射否曰解射祖曰汝一箭射幾個曰一箭射一個祖曰汝不解射曰和尚解射否祖曰解射曰一箭射幾個祖曰一箭射一群曰彼此生命何用射他一群祖曰汝既知如是何不自射曰若教某甲自射直是無下手處祖曰這漢曠劫無明煩惱今日頓息師擲下弓箭投祖出家師云馬祖被石鞏惑石鞏被馬祖惑續上座檢點將來各打三十棒因甚如此選佛若無如是眼宗風那得到於今卓拄杖下座住古松西岷山敕賜妙覺崇善禪院為敕封崇善深教大國師智中一天和尚設供上堂一乘演唱法界該羅萬德圓融捲舒自在至道本祗唯心八門便知方寸先明落處漸履玄微恆河沙數諸佛深觀議諦微塵剎億衆生洞徹靈明若神珠頓含衆寶猶帝網交映千光廓爾煙消倏如羽化捲舒互收一任剖判是我一天老和尚於此中興法王正令紹繼聖種不肖遠孫真續雉染於此忝作裔苗不敢格外生枝冒玷祖庭續上座則不然有條攀條無條攀例今向人天衆前略開爪縫展新條令舉吾祖翁三百餘年未了公案拈拂子召衆云如何是未了公案咄東卜西卜松潘鎮高護法請上堂岷山鐘秀瑞産靈芝兆三百年不墜之玄裔振中外末法之頽綱如天普蓋似地普擎岷峰頂上直釣獰龍崇善堂前權衡百軸空拳赤手出祖庭而入祖院鈯斧芒鞋去縛纏而住縛纏敢問大衆出入無礙去住自由是甚麼人履薦卓拄杖咄咄中元上堂十五日已前西岷秋色晚十五日已後金蓬瑞日長正當十五日天晴佳氣盛世泰兆民安且道還有奇特也未顧衆云家無異怪不貼鍾馗住古松西龍山敕賜大悲禪院浴佛上堂拈香云者瓣香歷歷明明包天裹地爇向爐中專為祝延今上皇帝聖躬萬歲萬歲萬萬歲皇后齊年太子千秋滿朝文武闔國公卿欽願澍甘霖普潤蒼生若莫邪肅清天地中外寧謐海晏河清此瓣香奮志亡軀苦琢成遼天縮地決忠真沙盆從茲堪盛受大起曹源一派馨熱向爐中供養敕封崇善演教大國師智中一天和尚歷代覺靈惟願常寂光中運悲智心微塵剎裏轉大法輪此瓣香權中外之樞機稟華夏之徽猷恭祝闔鎮文武諸大護法紳矜士庶現前大衆惟願柱石宗門邊邦寧靖斂衣敷座問毒鼓當軒誰人聚將師云中軍寶帳豎黃旗進云假饒三頭六臂鐵眼銅睛底人到來以何判驗師云王令不行先斬首大機一發聖賢悲進云還有方便也無師云護生須是殺殺盡始安居問昔日國師於此為國開堂和尚今日升座説法且道相去多少師云一點水墨兩處成龍進云還有奇特也無師云臭天臭地乃云虛空掘洞好肉剜瘡無位真人在蟭螟眼裏安營扎寨動地放光處處逞驢唇馬嘴説黃道黑與人眼裏添釘腦後著楔續上座到來直教風行草偃電捲星飛使人人頭頂青天個個腳踏實地佛來祖來飽與一頓因甚明眼人前三尺暗對他道懷州牛喫禾益州馬腹脹波斯搬出夜明珠蚌蛤心肝莫稱稱一任眉橫眼上耳搭腮邊我這裏拄杖子望空啓告善哉善哉復舉中國師訪楚山呈悟繇山曰如何是無字意師曰出匣吹毛劍寒光射斗牛山曰趙州因甚道無師曰波斯嚼冰雪不覺齒牙寒山曰拈過有無如何湊泊師曰夜深誰把手同共御街遊山曰向上還有奇特事也無師曰秋夜家家月春來處處花一雙明白眼何處撒塵沙山曰善哉師云撿點將來二大老也是陸地興波自揚家醜續上座則不然向無中生有敬為一頌陸地興波不即留畫蛇添腳乍來頭吹毛寶劍憑拈舉凜凜寒光射斗牛開闢古松西崇山無量禪寺工竣上堂拈香云此瓣香天地同根萬物一體拈起則彌六合放下則藏於密爇向爐中祝延今上皇帝萬歲萬歲萬萬歲伏願金輪永固帝德崇高再拈云此瓣香欽承佐助共沐仁恩爇向爐中恭祝本省文武諸大護法永作擎天玉柱常為架海金梁次拈云此瓣香恩同天地德邁羲黃爇向爐中供養現住昭覺堂上佛冤老和尚用酬法乳之恩斂衣就座上首白椎竟乃云撥草當風數十年灰頭土面被人嫌吾儕不是間狼藉平地孤堆接半天古人拈一莖草作丈六金身將丈六金身作一莖草大似蓮花出水開放新鮮諸大老於潔白地上明修棧道暗度陳倉誘引再來依他古人樣子行去續頭陀依本據今於平地上擁殿飛樓翬飛鳥革不數年而功圓告竣落成勝概山僧不惜唇皮登曲彔床與古松立個潑天門戶八字打開亦任後人於其中間行住坐臥建立佛祖最上一乘廣化衆生之標榜也且道結角羅紋一句作麼生道佛子住此地則是佛受用上堂古佛心宗皎皎月印寒潭祖師巴鼻歷歷春回大地舉起逼塞虛空放下纖塵不立風生古殿萬像森羅齊合掌月轉回廊十方世界盡承恩栽兔角於腮邊無中生有刮龜毛於腦後摝影撈蹤頭頭展佛祖家風物物彰人天正令卓拄杖震威一喝云舌翻霹靂談千古心括虛空悟一乘彭縣鳳凰山法藏寺掃塔上堂丹鳳銜書向紫宸綸音敕下九重城真詮法社灰已矣幸托吾皇復鼎新昔敕封崇善演教大國師一天老人於松州上院大悲崇善禪寺首唱巴歌為國誘民復於此山中興下院屢授宸恩沃懇田林二百餘載敕誥宸章寶器雲興忽值獻逆盡成灰燼幸蒙皇清一統佛日重輝紺殿瓊樓亦如舊置不肖於昭覺建立悟祖門庭未獲諸睪堵波前敬謁尊慈今日領衆來山與吾祖翁打三百年未諳之口鼓斬十二代未了之葛藤且道諸人還信得及麼不妨試出證據脫或沉思隨續上座塔前剖露分明至塔前以兩手拍云孤掌不浪鳴一鳴鳴摑摑所以古德云有條攀條無條攀例是則是也要兩得相稱遂爇香云世事但將公道斷月輪難較量包虛便拜松鎮右管沈護法請上堂登寶王座演迦陵音拈德山棒行摩竭令具如是韜略展如是經綸發一機雷轟電掃吐一語塞滿乾坤使天下衲僧到來截舌有分且道續上座有甚長處顧衆云闌干雖共倚山色不同觀小參魚聲暫息板聲傳看看紅日落西山清風透腋微涼起這個分明不隱瞞拈拄杖云大衆會麼祗如不會還是大衆瞞山僧山僧瞞大衆若謂山僧瞞大衆處處緑楊堪繫馬家家有路透長安若謂大衆瞞山僧知音不必頻頻舉達者須知暗裏驚且道還有不受瞞憨者麼卓拄杖云把手牽人行不得為人自肯乃方親結制小參三朝一七必定見個消息且道是甚麼消息驀呈拄杖云見麼若薦得便知腳跟下一段光明掀天鑑地耀古騰今脫或未然不妨山僧與衆兄弟們下個注腳昭覺結制始開籠四方八表盡通紅煆煉銅頭鐵額漢直逼生蛇化毒龍鉢盂橫安一張口束腰三道篾條箍問取祖師西來意管教心空及第無小參時臨長至一陽生鼻孔寒露冷沉沉分明舉似諸兄弟切忌嚴霜浸煞人有始無終仰箭虛空有終無始東瓜碓嘴有始有終八面玲瓏無始無終野干摶空薦得一句生死事畢薦得二句不如不會薦得三句渾然天地四句分明撩起便行此四句中內有一句殺活全彰照用同時撿點得出人天稽首祖師攢眉脫或未然山僧拄杖略較些子顧衆云本是長江湊風冷卻教露柱患頭風小參嘴邊覓底終險紙上來底是空自心知解猶差從他悟底曷是除卻兩頭三處作麼生是得也到這裡要實入大鞴爐頭煆煉一回則知師姑原是女人做這個消息不在言端語巧華簇錦攢以當了事巴鼻豈知自瞞了也昭覺門下總不恁麼只教他肘後懸符腦後見腮時來喫山僧痛棒始得還委悉麼咦要定乾坤之正眼除非足下有生涯小參收豎起脊梁當下周放挽著眉毛做一場恰渾把身心齊放下好衲被蒙頭不覺曉收放本不禁間忙恰好凌空杪再操昂然直到無生國菡萏馨香遍九皋於斯薦得收放自由脫或未然恰好不好畢竟如何奮然揣著虛空骨驚起須彌折斷腰臬臺劉護法對靈小參擺脫情關疾便行靈光獨露體常明無生國裏香風馥劫外瓊枝劫外春舉張無盡居士參長沙和尚問弟子常看千佛名經未審千佛居何國土還來攝受也未沙云黃鶴樓前崔灝詩題後還有人題也未士云不曾沙云得間時題取一篇好山僧看來好似陸地興波自揚家醜所以古德云黃鶴樓前法戰時百千諸佛豎降旗問渠國土居何處贏得多才一首詩山僧有一頌今日是我劉公大護法靈輀將駕特表衷腸四大本來卻是空時人切莫問西東要知諸佛居何國黃鶴樓前水不通今日設有人問劉公大護法居何國土山僧只向他道遠望故園千古月無心回顧正當頭哀子嶽鐘瑞琪請為先慈對靈小參以拄杖指靈柩云林木含悲雉鳥啼庭蘭玉砌草萋萋金靈托質蓮池上皓月依然照海西所以道處生死海石女明劫外之機踞涅槃岸木人唱還鄉之曲七情永脫靜若澄潭五障緣空皎如寶月説甚麼天堂地獄六道四生直下知歸頓踰諸聖於此會得淨裸裸絶承當赤灑灑無回互共見今辰歆薦皇清誥封一品夫人嶽母王太君齊家治國賢孝忠真婺宿靈明不遷不變棄榮位而生淨土捨煩惱以證菩提王太君於斯薦得即往南方無垢世界座寶蓮花偕娑竭羅龍女把手共行一時成等正覺脫或未然山僧拄杖直下承當捩轉向上關頭去也若據向上關頭千里結舌慟念孝子嶽鐘瑞琪人本乎母物本乎天哀哀慈母生我劬勞欲報深恩昊天罔極緬想音容乞法資薦敦請山僧祗就靈軒登寶王座轉法輪音今對人天衆前不妨露個消息良久云諸行無常是生滅法生滅滅已寂滅為樂此是古人的阿誰信得拈拄杖卓云一回拈起一回新子規啼破月三更天明個個知端的大道人人放腳行結制小參舉古德云十五日以前樹凋雲作葉十五日以後月滿兔兒肥正當十五日晴高天氣正世泰兆民熙古人恁麼道山僧則不然十五日以前只是恁麼十五日以後只是恁麼正當十五日只是恁麼拄杖子卻又不甘出來道雪山老漢恁麼道也牽枝引蔓若己事未明豎起脊梁緊捏拳頭朝參暮請行不知行坐不知坐驀然撞著露柱㘞地一聲始知鼻孔原來向下垂更不去向人門戶討諸兄弟還信得及麼良久云把手牽人行不得為人自肯乃方親中天節小參大慧老人道今朝五月五大鬼拍手小鬼舞猛然撞著桃符神雙手捶胸叫冤苦師云大慧恁麼道未免見神見鬼山僧則不然今朝五月五天師騎艾虎赤口上天去百舌入地府且道大慧的恰好山僧的恰好是定當看小參十方同聚會個個學無為此是選佛場心空及第歸且道如何是心空及第歸顧衆云自是不歸歸便得五湖煙景有誰小參文殊一日令善財採藥曰是藥者採將來無風起浪善財便觀大地無不是藥即來白曰無有不是藥者眼底有斤殊曰是藥者採將來文殊被善財惑善財遂於地上拈一莖草度與文殊全身擔荷文殊接得示衆曰此藥一能殺人一能活人泥裏有刺顧衆云山僧恁麼道還有優劣也無休將間學解埋沒祖師心小參身是菩提樹心如明鏡臺時時勤拂拭勿使惹塵埃菩提本無樹明鏡亦非臺本來無一物何處惹塵埃這兩個惡口小家各打二十棒因甚麼如此從前汗馬無人識祗要重論蓋代功松鎮周護法請為先慈李太君對靈小參師以拄杖敲柩云迥脫塵寰絶世緣瞥然直上彩雲鸞山僧頌出無生句祗要諸人仔細看若向這裏薦得則塵國轉為佛國福基翻為法基攪長河為酥酪變大地作黃金脫或未然山僧從頭注破恭惟李太君恩賜鳳誥榮秩皇封仁慈惻隱惠淑洪深便能福慧齊修致使兵民共化一旦賓天敦請山僧舉揚不生不滅無去無來之消息老太君還會麼若也未然山僧一偈頌出天荒地老恨難忘愁聽子規鳴上方欲得斜陽消息盡奉攀玉輅駕慈航中元小參十五日以前拄杖子望空啓告十五日以後拄杖子入海算沙正當十五日且道拄杖子有甚巴鼻四生六道承恩力八難三途出苦丘舉趙州問一婆子甚處去婆云偷趙州筍去州云忽遇趙州又作麼生婆便與一掌州休去師云這婆子雖然好手要知賊身已露趙州休去總是個佛口蛇心續上座撿點將來也是一場懡㦬噁小參堂前靜板口喃喃縱似牛皮也叫穿珍重滿堂雲水客古木也解説枯禪拈拂子擊香几云這死木頭道有些點掇向人耳孔裏出入大衆於斯薦得不妨聲色堆頭親見本來面目脫或未能山僧拄杖與諸人露個消息拈拄杖擊空云好手手中呈好手紅心心裏中紅心木人把板雲中拍石女銜笙井底吹拖拄杖入方丈祭正宇沈叔父人之寄身於世也以天地為逆旅以光陰為過客而浮生碌碌春秋幾何惟繼述有賢丕顯其親雖貧亦富雖亡若存榮封待誥無忝所生若吾叔也忠厚傳芳稟直持身教育賢嗣英略超群才能邁衆鳳闕摽名勘匡戎伍勝任邊城於國有光顯耀門庭賢孫繼起道術修明展三略而鷹揚奮武諳六韜而庠序增榮承祧若此夫復何憾姪也叨侍猶子未申裏忱幸際靈輀兆駕建闢佳城願假箬蒿而舒鬱懷潛悽愴以淚淋浴躬越宿祝祭於庭靈其不昧來格來歆祭慈母傷嗟慈母恩同天地為子不肖痛裂五內我生頑鈍雀息鳩視不拘庸俗亦幸而寄雖隨三寶未出塵纍即就人緣福田度世悼推其因何以至是背母慈顏念追無極方命東遊志勵勇鋭力持雪山酬此恩恤身域於彼心趨母膝豈不懷歸料本不及忽爾訃來無任依戚籲天不佑胡不及已蒼天何苦離我母氏今莫之為中局徒潰憶昔歸謁迎門笑喜堂見闐然孤燈塵几慈和粹溫川流逝水撫柩哀號涕零血雨杯酌爐香區區全禮天地有遷此恨無極師太塔前上供數年別祖已西遊今日重逢又聚頭滴水虔申無限恨一爐香徹海天秋瘞香云伏冀慈顏光前裕後本師老人三周詣塔前上供云古字山頭解打鼓昭覺堂前唱吧歌哩哩囉吹毛用了疾須磨大唐國裏曾饒舌蟭螟口內瀉銀河麒麟獨步丹霄外優鉢花發稚猶多是則雖是子不談父德虎不食雕殘賴吾祖翁偕本師於風煙劫火之際斬荊棘而中興祖域建法幢而沙界流通四十餘年一段光明被不肖一狀領過不敢舉似諸人今日向開口不得處聊申薄奠敬酬木本且道吾老人還來享祀也未遂爇檀片云吾師不祿已三周幾度悲傷幾度愁不肖塔前焚榾柮一行鼻涕兩行流君瑞沈守戎率男國卿請為誥封沈公正宇府君對靈小參師以拄杖卓云此方真教體清淨在音聞我亦於中證不惟觀世音大衆向這裏薦得則知我正宇老封君住世七十餘年成家樂業教子育孫則生未曾生雖滅何嘗滅生滅本來空全身光皎潔即今向甚麼處安身立命咦了知去來皆虛幻永證金剛不壞身為得戒生慧和尚塔前上供昔侍老人巾此見老人形多年不相識冷眼認不真假饒認得真又作麼生會遂炷香云相看投機處青山覆白雲定空師翁幀前上供爇香云一片旃檀一滴泉一聲洫淚一聲天師翁曲鑑窮兒醜佑我重輝智祖禪恭惟師翁那伽證鑑長至小參日南一縷莫唐捐嶺上梅花放鼻尖君子不擇仁里厚時人得得望高攀九九三三三九九拖拖扯扯入羊欄兔角回紋分袂也不知那裏是長安咄庚辰戊戌準一百五十天參下座本師冤老人塔前上供小參萬年池畔培松竹石子嶺頭韻古風不是窮兒煨榾柮白蓮潭底種芙蓉此瓣香拈則乾坤失色爇則日月潛光不肖於師資默契處信手拈來供養昭覺第二代佛冤老和尚惟願威鳳山頭豎赤幟於末運白雲窩裏産鳳麟於斯時奕葉垂蔭枝繁派遠乃云萬年潭月印前溪鳥喚猿啼寂寂悽窣堵波前陳九拜潛潛不覺十年西今日法孫常胤於西山光相下院得得歸祀吾師忌辰的一片栴檀以表翁孫父子哀腸想吾老人還來享祀也未是則是也要諸人著些精彩始得遂爇香云九夏風清寒徹骨百年痛根幾時休吾師不棄兒孫醜常寂光中運九籌便拜長至小參冬日打鼓升堂牆壁瓦礫生光放出日南一縷山河大地回陽飢餐新羅附子渴飲蜀地生薑君子不日成之小人道發顛狂一任間神野鬼到來絶迹潛藏薦取碗底箸頭大家公驗承當且道承當個甚麼卓拄杖咄云惟有松竹二友年年傲雪凌霜下座為清逝節壽白老孺人對靈小參七日花神送子規耄齡霜節越蓮池倏然覷破浮生面睹史陀天立聖基恭惟老孺人坤秉乾運德淑宏深一旦跨鶴乘鸞頓使風木含悲若據此著進前三步險退後一番新假饒人天釋梵有情無情出此不得遂豎起拂子云還見麼擊香機云還聞麼若能見若能聞木雞抱子來天地玉兔懷胎向紫宸洗得一林霜雪淨優遊駕鶴向瑤京玉轉珠回覿體全彰之受用也山僧不獲已以慰孝忱指出末後一段光明豎拂子云八十餘年同逝水三千世界等浮雲瑤階玉珮鳴仙樂信步高登化樂城據此公案亦未平實商量作人情會虛空昨夜板齒脫落作佛法會戶戶門前剛把火家家有路透長安二據不涉且道向甚麼處卜度則知老孺人落處麼咦溪聲山色鳥喚猿啼這邊那邊亦任著綴嶽阿哥為母辭陽請説送靈小參師云幕府聲慘終天之恨難酬繐帳風寒罔極之恩莫報若據佛法相會撒手那邊千聖外謾道流涕通滿眼牧機盡知音雖然如是也須驗過分明豎拂子云處處門前剛把火家家有路透長安梨花香處分明薦莫道靈雲話別傳步步蓮花藏處處極樂邦一念超今古全體遍十方楊太君不涉途程一句作麼生去虛空玉輅下瑤池直下相逢分外奇柱杖頭邊親薦得坦然大道任驅馳楊太君且道路頭向甚麼拈拂打圓云默直去指路小參柱杖芒鞋詣宮牆資薦金靈達帝鄉挨落珊瑚枝上月洗清大地一天霜楊太君到這裏有國可治有家可齊有子可教有孫可育還有生死可了麼其或未然恭惟楊太君莊周夢熟駕返瑤京仙樂迎空韻徹森羅萬象當下了明自性一齊合和拍道戢坤樞於未兆藏冥運於蓮邦一段英聲激揚今古乃老太君玉轉珠回覿體全彰之受用也山僧不獲已以慰孝誠指出老太君末後一段光明豎拂子云青鸞高駕步瑤京柱國家聲啓後昆玉偈親拈陳露布無生國裏現金身為清涼三峨和尚對靈小參疏鐘泣淚出雲堂月影空林轉上方即今便為真極樂乾坤大地一臺芒恭惟清涼堂上傳天童第五世上三下峨大和尚竿木隨身坐斷三峽錦水逢場作戲活埋萬里雲煙十字街頭垂手三惡道中橫身有時把住截兔角於腮邊有時放行括龜毛於肘後幼年承悲願海隨吾師翁丈老人重闢昭覺中興祖域壯年侍法叔浪和尚住持法席執侍巾瓶暮年於北隅青天鎮金華寺以栖老焉有嗣法門人照升請就清涼養終此是我法兄七十餘年一段光明今日被昭覺拂子頭一一注破且道諸大衆還信得及麼昭覺則不然代老法兄打口鼓去七十餘年住世間粗拳白棒接人天今朝撒手還家去喜殺龍潭老德山下座長至小參仲月打鼓升堂牆壁瓦礫生光兩雙芒鞋似虎七尺烏藤如狼一任佛來祖來到此截舌浮芒薦取珠衣下事盡在日用尋常卓拄杖顧云有甚憑據一陽來隴頭春信寄寒梅下座為西逝皇清誥授鎮遠將軍光祿大夫贊之李大護法禫服對靈小參夜月照人寒徹骨松風羅面鼻頭疼鏗鏘寶劍盡塵封柱國家聲萬古騰恭惟大護法威震中外德被寰區佐王師於百代奠河山於千秋現將軍身而福國祐民體聖人心而欽承治化名昭日月功參天地標精忠於銅柱躋壽域於春臺柱石金湯天心仁愛不意流光冉冉石火沉沉寂爾賓天五內分裂屆今易吉之辰人子亨時等痛維罔極緬想音容敬延梵侶披閲琅函敦請山僧舉揚般若大護法這一段光明盡在山僧拂子頭上耀古騰今大護法還見麼若見不勞拈捶豎拂搖唇鼓舌脫或未然聽取下面注腳豎拂云拭杖芒鞋打口鼓昭覺一曲原無譜怎似將軍拍調高等間韻出千山舞南洲為琴虛空為鼓拍拍相應聲聲相助白雪陽春歸去來蓼莪聲裏從頭數箇中消息孰知音五桂庭前泣血枯對靈小參云就道高登選佛場人天魔佛絶商量爐頭片雪分玄要直下分明這點光恭惟皇清誥授上壽柱國榮祿大夫嶽大護法金靈龍樓標百代之功勳鳳閣注千年之忠孝不意流水已夕劍閣生塵一旦賓天俄臨窀穸不昧鷲嶺真機示宰官而宣行王化山僧現宰官身而為説法驀拈拂子打云大護法還薦麼若見一超直入如來地好向如來行處行若也未然山僧拂子頭與大護法露出個去銜轡馬三腳驢黃金甲福田衣翻來復去到幾時山僧不昧靈山托相送將軍入化城北廓居山十里餘忽然訃至卒王師山僧五內俱摧裂惟有山河草木知大護法自良知歸去來兮有誰知十字街頭打口鼓華陽城裏韻無生風幡不是間家具收拾添綸上鉤時平田路默直去振杖云收得當天明月在五湖煙浪有誰爭對靈小參云芒鞋拭杖詣錦江資薦金靈返帝鄉葉落林悲真實現再來佛種萬年香恭惟清逝八阿哥諱玉麟金聲振地凜凜朔風吹大夜玉轉珠回哀哀生育返瑤京一彈指頃受百萬億尊貴一剎那間享無量無邊福祿亦任這邊那畔撩起便行今以童男身得度山僧即現童男身為汝説法今值遷化之辰山僧不惜眉毛對靈柩前舉金剛不壞之真詮説無生不滅之佛事還委悉麼遂舉火炬打圓相云白玉麈中真佛現紅蓮花裏露全身聖制日值高太丈老人誕辰塔前上供小參者瓣香在搬磚運瓦汲水挑柴拖犁拽耙霜衣雪甲糞草堆頭處拾來爇向爐中供養清昭覺開山第一代上丈下雪老和尚恭惟老人層識得一十五夏契盡依本據令即今這邊二百四十花那畔二十個冬莫不是五百六十年前公案未熟吾老人計得麼則不然借此栴檀薰老人鼻孔一番不可遂爇香云萬水千山獅子窟十方世界象王城滹沱正脈起今古後代兒孫如是傳舉火法語流光已滅落花無返樹之音石火停機逝水絶歸源之路是我定山上座生緣已畢振化皆空生滅寂滅寂滅為樂之快活也昭覺到來無法可説借拄杖子道個不生不滅法與老上座指個路頭還委悉麼於斯親切與拄杖子有甚交涉脫或躊躇山僧向這裏下個注腳以拄杖指龕云默去舉火拈火炬打圓相云秋風起秋葉落秋水長天鶩獨宿秋雲巧秋雨沸秋鴻隊隊泣南樓秋夜涼秋聲遏秋蟬報道君脫殼定尚座這個關頭牢把著九眼礄畔清風起紅蓮花裏換皮骨噁咄咄遂擸原書闕捐資刊録嗣法門人法光照隱正義心學正智常靜通福福清通歡德紀福印戒弟子海金常溥翀石捐資法弟子宋貞玉喬常齡劉常懷喬秉瑞李逾松同刊康熙四十九年仲冬檇李項聰友書嘉興楞嚴寺經坊夏維寧倪爾刻
