body:
  text: 昭覺竹峰續禪師語録序余少壯時喜偕二三及門讀書山寺聆晨鐘暮鼓以為夙興夜寐砥礪讀書者之一助每講説經史窮極搜討散懷間步愛揖宗老禪伯談證西來意旨輒亹亹忘倦於是儒釋交融機鋒湊泊樂把余臂入林者數公如放雲之嘯堂楓溪之省庵二老皆前輩也余縛舉子業久麗塵網頓遠超悟今出宰成華陳陳劫劫惟徵逐風塵歸途極目當天霽時片刻與西山太古雪冷然相對而已昭覺古林間從旗亭送客鞭絲東指以為此中大有人在則續公是也豫之見續公者數多以事不及參竹篦而續公視余亦以俗吏故茶瓜外兩無訓答雲行水流余二人之謂歟今秋閏適家道州刺史淑公來蜀訪勝尋幽得遇續公坐古桂下正當樨香撲鼻無隱之旨親相證矣遂出禪藻若干卷索序於道州而道州轉以屬余夫道州與續公相證於古桂下者云何云何而乃以屬余余非門外漢耶門外人説門內事不獨續公笑余道州應先笑余矣雖然續公語録具在余於簿書之暇挑燈一讀依然如少壯時在山寺中與禪伯宗老相談證亹亹忘倦而已正不必援儒入釋強附知音也漫為序時康熙四十九年庚寅歲閏七月檇李周輔奏稿序夫執語言文字以為道非也離語言文字以為道亦非也昔達摩東來直接上根心不傳而傳法無説而説迄今支分派衍祖祖相承燈燈相續其間珠聯壁合廣布流通總以利益後人開悟知見為大法光明地豈曰小補之哉竹峰續禪師者世本松人其母誕時得夢兆即許出家後因誦法華經有疑遂辭親至會城參昭覺本師老和尚不數年盡得其源流會余奉命駐節松鎮久聞其名而未之見也歲庚辰以戎政之暇覽勝雪山池名七實洞顯黃龍霧靄雲橫堆璚疊翠信古聖修真養道之所惜乎歲久基廢因合諸同志闢荊除莽建立花宮爰請和尚為雪山主席居未閲歲因本師年老速師歸主持昭覺院事歷年來其語録并機緣頌古書問雜著班班具在嗣法門人實悟等敬請刊布以垂後學問序於余余夙慕宗乘用廣法音樂香山之雅會邀慧遠以同遊故言是道即連篇纍牘不以為多言而非道雖一字猶贅也嗟乎如續公者真可謂片言心印川月皆圓觸處靈通隨機發現揚宗風於廢苑開覺路於鶴林無愛無憂顯無生之妙諦一瓶一鉢折般若之根源與壁觀默示者有同乎否耶曰是則同康熙歲在上章攝提格春三月日鏡湖周文英拜手謹序序余方齠齡頗喜談象教而樂遨遊凡所過名山大川叢林古剎即流連不合樂以忘歸於庚寅歲緣銅街之碌碌聞玉壘峨山形勝甲於天下由燕臺來蜀省家成都公於錦官署即楊子雲故居也常與二三友朋刻燭分題歷覽諸勝登少陵之草堂乃旋而之北訪昭覺寺謁竹峰續禪師見夫方丈崇宏金容焜耀復稚香滿院清芬襲裾境甚幽也評泉試茗談論亹亹不倦情甚洽也斯時也豫蓋樂以忘歸矣且出所著語録若干卷屬余序而請家成都公亦辨其首焉反覆讀之意固軒爽語更俊快奚僅參透三昧得上乘法重見曹溪宗旨駕慧遠諸公發明西來大意已哉且儒家流也異日者闡揚大乘為西蜀之宗主者其在竹峰乎東坡云時文凋斃僧雄強但鳴風雅非鼓譽今於竹峰見之蓋不啻受一番棒喝矣噫嘻余宦海驅馳二十餘年風塵鞅掌筆墨久荒未卜何日芒鞋竹杖相與晨夕聯床親聆奧旨以醒迷途而登彼岸也興言及此依依不忍舍昔人所嘆相見時難別亦難良有以夫余歸記於子雲亭乃問竹峰請即以此為序可乎竹峰頷而笑曰可時康熙四十九年桂月榖旦吳江周飛熊稿序西蜀形勝頗異他州玉壘之高岷江之湥其間多産異人名山峻閣在在皆有而蓉城為最錦官僧院又以昭覺為最地近省會路通南北高僧名衲往往住錫於斯開建以來代有禪師本朝之初先有破山禪師繼之以丈禪師又繼之以冤禪師源流有自宗風益彰誠難乎為繼今則繼之以竹峰禪師蓋能集三師之大成者也師本松山巨族生而穎異幼入空門矢志禪關頓悟宗旨苦行五十餘年專以清靜為心慈悲為教益州士庶咸受指迷即省會文武官長莫不崇禮竹師師每以清靜可為政慈悲足愛人為諸宰官言之宰官因其言而清靜則蜀地獲寧因其言而慈悲則蜀人被澤師在昭覺非徒寂滅自治實大有益蜀人師之功德在世道行在躬惟見性明心開示後學若夫語言文字其緒餘也非師之所尚也而受法弟子欲因文章之可聞求性道之不可聞乃集師生平語録為若干卷將以繼昭覺三禪師之傳焉弟子彌佑洪演彌願等受法甚久信道甚篤奉師語録不遠萬里送入浙嘉華藏用垂永久念可謂誠功可謂苦良由師之善誨誘入人湥切故衆弟子佩服忘勞也由此永住昭覺修己化人其闡揚禪教寧有既哉不揣荒謬敬為之序臨印法弟王前驅頓首拜撰昭覺竹峰續禪師語録目次卷第一住成都府威鳳山昭覺禪院語録卷第二住成都府威鳳山昭覺禪院語録卷第三住松潘西岷山敕賜妙覺崇善禪寺語録住松潘西龍山敕賜大悲禪院語録開創松潘西崇山無量禪院語録開創雪寶頂雪山禪院語録成都府彭縣鳳凰山下院敕賜法藏禪院掃智中一天國師祖塔語録昭覺首座寮秉拂小參佛事卷第四頌古示偈法語卷第五行繇機緣分燈卷第六詩偈書問雜著昭覺竹峰續禪師語録目次終請主古松雪山寺期主周文傑張偉奇楊繼震吳輄李承恩俞廷亮張良佐韓鎮余世瑞楊永泰率闔鎮紳襟士庶等公啓伏以面壁芳懷咸向名山湥選勝傳燈佳譜悉由淨土紹徽音欣前哲之幽蹤叨承鼎建念開堂而説法尚藉住支恭惟大和尚識精三昧鑒徹六通昭覺紹衣允擅西來法器真如默諦展稱無量禪宗貴慧日以重光尚思普照廣慈航之攸濟寧靳傳心聚石為徒憶昔冥頑能點首弄拳示教於今頓悟豈無人要在藏修還從往迹繄我松州勝地實惟雪嶺奇峰考棲迹於先賢文昌多賓緣遊經於浩劫殿宇汙萊藉檀越之發心更新日月念叢林之衍祕重賴師資用廣咨諏莫如和尚敬修菲幣肅迓安車伏願飛錫遙臨偈演蓮花光法諦浮杯速渡薪傳梅子大宗風非徒梵剎增輝庶幾前徽靡替謹啓
