過北斗不題生死葬山窩可憐莫奈修葺何祖佛門庭日日磨非是吾儕強拈出天王華屋已成窩可憐莫奈饑寒何寒則寒兮饑則磨運水搬柴齊著力大家扶起破沙窩可憐莫奈入纏何動靜營為百費磨戴月披星隨出入不知那日出塵窩可憐莫奈钁頭何種月鋤雲薦琢磨翻轉山河平大地虛空現出白雲窩可憐莫奈自身何翻覆娑婆歷劫磨今日方知燈是火翻身直入鳳兒窩可憐莫奈戶門何客至恭倍熱亂磨蠶老麥黃秧上節不知時誤到寒窩可憐莫奈做人何好歹憑他這等磨不怒不嗔不我慢恁他車馬踐山窩詩偈得禪字六首慧日長明卻是禪開弓直射白雲間紅心裏內討分曉得意風波起杖藍這個疑團卻是禪囫圇盡在我山間有時劈碎毫光現入聖超凡脫綱藍默然靜座非無禪離相絶非何有間無縫鎖開金索斷返身一步脫塵藍海裏藏身就是禪無形無影在人間聞聲只見隨風轉喜氣彌陀出鬧藍萬事糊塗有甚禪安心且住白雲間有時頓破於諸劫撒手歸來出垢藍萬物歸來亦似禪蘆花明月滿溪間時時應現青霄外處處光輝錦繡藍五七言雜詩羅潭深水泣朝陽小雨沾花午夢長忽聽黃鶯聲嚦嚦偶拈句子緑蒲香砵盂三度口喃喃兩眼無聲受熱瞞珍重耳根親薦得珊瑚枝上一輪圓可憐莫奈一身何業債犁耙項上拖要得身心無罣礙除非石臼念摩訶披荊削刺念年零業債犁耙不暫停藉得龍天出雙手大家扶起破砂盆枯木寒巖是若何分明見處卻淆訛人天衆集親分付不讓當年龐道婆年垂六十有餘香半葉成文覆錦江拍轉健軀堪可用霜天雪月正朝陽吾年老大一無能業債犁耙項上沉傲雪凌霜憑薄鑑鋤雲摘月效餘生摩眉擊轂閒藏拙拽後攙前振舊林檢點芒鞋勞掌管魔宮虎穴恁遊行香智國王産禍胎東西獨步嘆奇哉老僧說與曹公薦大地山河口一開老心不歇住閻浮那日才將業識除但得龍天伸背項大都祖院亦恢弘老心不歇住林間未得心間半個天業債犁耙何日了安心法要幾時完老心不歇住叢林拙斧芒鞋不暫停佛法原無分內外還須日用自推尋老心不歇效先賢運瓦搬磚糶飯錢坐消信食終何益龍天推我向人前老心不歇住巖間撥火拈香樂衆緣但得一些超無漏米蟲嘴底上花班我家門住北隅東十指焚檀祝聖容四海九州歌大有山間林下樂堯風汾陽茶飯飽諸方佇望闍黎仔細嘗呷著些些容易可不知滋味落前贓但得一些快活處話長語短說周遮知音問道無為句撫掌傍觀笑傲賒清旦平明展舊荒是誰茆塞是誰光兩輪相照乾坤老一法流來天地長萬年池下水潺潺太白峰頭起暮煙西蜀一燈超列譜正傳祖印接人天日暖風和柳眼睜梅花嶺上笑迎春一陽未肇先呈瑞大地山河宇宙分朔風吹葉落前溪驚起魚龍拍翅飛直到洞庭點額後大精小怪盡攢眉磨煙寫竹話無生說起無生吃一驚有句不藏無句裏西來大意個中尋葉從雙桂飄香遠昭覺門楣萬顆松遁代兒孫光祖業高風千古鎮閻浮優曇不與世花同價直娑婆第一峰昔日然燈曾授記人前切莫露真蹤優曇花發一千年善慧因緣莫等閒今日老僧開正眼蘇多仙女賣花完香巖樹下問西來只在鋒芒語默臺未上樹時親注腳虛空笑得嘴唇歪貓兒生得十分全遇著南泉一命完縱使草鞋能救得到來水落數丘田春王節令換新符卮酒高吟舊歲除爆竹一聲通帝座梅花數點壯皇都三陽開泰喜同春六合通和萬象新野老謳歌欽聖範群黎悉讓樂堯仁載陽春令屬坤符水運金生戴虎呼元老聲聲歌大有芒神攜履謹三呼一陽未兆百靈先袖裏乾坤顛倒顛六個三三消息至大家攜手上長安挑燈說話韻三玄棒喝門庭亦任談只要兒孫行得去百千三昧掌中觀嘉眉邛雅屬南遊歷有三蘇不入流行到水窮山盡處桑榆梓里羡嘉儔黃龍三關驗諸方佛手驢腳八面張遇著東村瓦罐漢和盤托出正當陽一花五葉遍人間不是知音不與談但得一絲針線處拈來無不是心言德山棒兒兩頭齊豬狗人來一例施但得知音分真僞大家性命一時離雲門糊餅的榴圓包括三千並大千誠者應須囫圇咽旁觀舌底水潮天趙州八十遊行腳略杓當機報不平昭覺與伊通口氣二王稽首共相迎鼓腹興嗟已有年磬懸民室轉凄然欣逢甘雨頻天降滌滌山川靜萬緣威鳳高棲第一峰不分平地與西東薄酬親拈蓮池上謾道逢人露曉風除夕今宵煮瀑泉松花竹葉共爐煙倒身九禮酬三有一句無文說聖篇戴月披星負苦咨龍天默鑒盡遙知悲哉少遇知心友終歲勤勞訴與誰豐年樂業氓綿綿仰藉吾皇一統乾老稚聲聲歌大有八方鼓腹頌堯篇除夕張燈韻酒卮深煨紫芋煮黃虀時人莫笑吾儕樂枕石高眠日落西磨煙寫竹韻詩黃太古清音振八方薦出三才中故事筆尖頭上露清香月影峨眉映華塘蜀山吳水寫文章挑燈句子分心要韻出松濤梅竹香出入常持不語經己躬下事細追尋逢人止說三分話切莫全拋一片心錦浪回文佇八筵長天日色任摶鸞饒君八萬四千里不出闍黎鼻孔邊雲門餅子趙州茶信口親嘗百味嘉識得箇中真旨趣階前不語樂無涯浴日榮輝福慧明挑燈寫到旭東升百年三萬六千日那討餘生樂寸陰三不是兮六不收放去卷來得自由山僧妙用無人識一飽無餘百事休石邊流出冷花裏過來香二句都非是鼻尖吐出霜鐵關不下馬泥牛入海藏牧童攜著鼻牽來共較量萬年池畔鶴獨立不知秋惟有潭頭月與君共漫流七尺烏藤拐常拈報不平祖師藏鼻孔處處野猢驚一口無底鉢三度濕衣襟何日口朝天高懸倚北宸一領破衲襖綱綱重七斤包藏屎尿桶伴我了餘生一品無孔笛聲聲韻九韶五音和六律不與個中調一盞無油燈光明處處騰三途與六道遍界仰升恆雞鳴日正午林鳥鬥聲稀敲韻分新句個中識了疑紫氣凝霄漢寒光射斗牛太阿橫宇宙兔角映江流白蓮池畔叟履杖過魚橋前指沙村柳親手插柔條松竹梅三友凌霜日日森標清同應柏風雨溢精神百花紛鳥語山路伴猿行我本無心顧因之兩不驚韻新春元旦東皇啓瑞煦三巴風景清奇萬彙嘉椒酒歡吟調玉燭嘉珍喜宴賞新花春風幃幕鶯聲巧緑柳芬芳燕語賒野老謳歌霑化日時豐歲稔享年華秋雨有懷彤雲映日落淋津半濕山河半濕人昨夜銀河生瑞色今宵乾象謁花神庭前翠竹佩珠玉隴外蒼松戴緑蘋洗得一天星月現依然旭日又東旻祈晴感興頻瞻銀海泛瑤池里甸桑麻息釀之野外不聞花鳥鬥隔林只聽雨聲資天心憫恤逾淫律帝德抒暘百穗宜萬物豐盈沾化育群黎踵額頌堯詩懷浩生禪師一脈清懷萬里長山環水秀印當陽拈提祖令高揮拂寄錫禪燈遠襲香白業凌霄貽爽氣清風高節豈蒼茫彼來未法承弘護堪謂曹源豎紀綱懷寄惠禪師滿放枝頭久幹臨偏多野興足高吟每披玉莢舒君意鴣立庭前似我心點破樨香明北嶪踢開溺器憶東林秋晴共得清機活好聽丘隅語雜音懷問海禪師一律微吟寄遠從愧余寡學愧余慵情牽月霽幽齊冷且喜松藝滿徑封秪擬無人貽別偈應懷有義肅雍容相歡遠晤多如許聊寄枯腸紙一丰和八首韻金泓緑水吐𣶺溪石女含笙過澗西緑繡玲瓏冠禮樂竹床漏月聽寒雞匏宜萬物豐家國土厚榮生百卉齊革固邦畿中外吉木承巽位鷓鴣啼回文二律芳芬馥桂子生香蕊放枝頭點翠蒼羌外蜣飛鸞鳳舞揚風拂麗艷春萇紅花緑葉葉飄風緑水隨聲入桂叢狨攜子啼猿抱子風梳葉落葉聲窮暮雨思親秋雨西風淚濕巾胡天不佑我雙親庭前墨畫塵封鎖階下兒孫失綵新斑衣架上懸蛛綱椒𨡬盤中滴未伸九我深恩何日永羹墻大啓享千春中秋賞月瑤池昨夜晏群仙未得蟾宮月已圓今夕太華光海嶽明朝星象列乾天根藤懸角家家熱高厚升恆處處然里頌村歌中外厚萬民樂業祝堯篇和靈默禪師桂花韻桂花香馥遍枝頭時把清風送小樓十里長亭親面晤百花叢裏不垂秋紛紛惹得遊蜂嚷點點偏令逸士求珍重花童休折損留來滿院作圍周八仙總贊道人家說長生蓬萊三島信腳行有時騎鶴上青霄有時葫蘆裏出神饑來時持鉢鐸拐杖隨身行出谷望煙乞食向前村一飽無餘真快活暇來時遊山嶽十洲三島憑出沒任他風雨一齊吹冰肌玉骨頻頻過渴來時長生藥玉液瓊槳真甘露崑崙頂上湧清泉十二重樓直透過醉來時伸足臥枕高眠星斗出狂歌一曲醉扶歸任他旁人道強弱悶來時品玉簫聲聲韻出山坡調笑傲煙霞歸去來三山五嶽隨我到醒來時桑田熟處處歌歡好晚禾長嘯一聲天地間倒跨神駒入大羅咄不是昭覺門庭高殘處怎生容你住衆仙長家不序長再莫回顧咄咄咄自贊紹祖山前個漢一任人天讚嘆有時種月鋤雲有時清風結伴這樣人兒少有請去川北供獻阿呵呵不是賓頭盧大德原是昭覺竹和尚咄定空和尚像讚古松西岷妙覺堂上歷有老僧不通提唱不重機鋒不拈拄杖一柄钁頭七十餘光問是阿誰定空和尚昭覺德雲悟禪師語録乙未年冬月初一日奉本師老人命秉拂上堂詣座云這片地這張床是則現前親到始得便登此一瓣香豎窮三際橫遍十虛爇向爐中祝延當今聖主萬壽無疆儲君天眷安如盤石此一瓣香奉為本省當道文武尊官祝願股肱王室共沐堯仁此瓣香巾瓶一十五載不曾動著毫芒今命秉拂不敢違諾向獨王頂上信手拈來爇向爐中供養現昭覺堂上本師上竹下峰老和尚用酬法乳深恩上首拍捶竟問今日升堂即不問如何是法王法令師云舉頭天外看誰是我般人進云如何是舊家風師云三門八字石獅子進云新舊一句作麼生委息師云八兩是半斤問鐘鼓交加空谷傳聲人天普集十方諦聽即不問西來意旨是如何師云兩眼對兩眼進云拈花嫡旨少室單傳別有商量麼師云有乃云威鳳山前獅子吼乾坤失色鬼神愁恁他八面四方來肘後靈符懸北斗一十五年醜拙今朝舉驗人天有時拖泥帶水有時敲星摘月有時鐵眼銅睛有時自救不得雖然如是也要大家知委卓柱杖咄云不是諸方五味禪眉間寶劍吞皓月復打圓相云月下座丁酉年正月十五解制上堂祖代相傳鐘鼓交接五十餘年鉗鎚未歇二時粥飯日日精潔這個消息體效先哲柱杖未動是事體秩今朝上堂對衆弄拙直直承當且道承當個甚麼卓柱杖云衆弟兄們今朝解制著卻草鞋擔卻擔子便為行動殊不知昭覺這裏日日著草鞋朝朝擔擔子未嘗向諸人道會得不煩久立安身脫或躊躇昭覺一偈頌出慶賀元宵月正圓明明歷歷透三玄春風吟動柏松子喜笑梅花遍界鮮下座戊戌年正月十五日解制上堂法語天關才轉地軸始回山川獻天然圖畫草木吐本地風光換卻天下人眼睛透徹衲僧家巴鼻即今正當十五晴暖春風襲襲觸目無礙法門大家一時及第大衆山僧與麼判斷且道向這裏還委悉麼若知委者不妨久立三條椽下七尺單前饑來吃飯困來眠其或不然山僧與伊別通個消息跳出昭覺門庭一恁東覷西覷下座昭覺德雲悟禪師語録終嗣法門徒性滿等編康熙四十九年庚寅孟冬月南旋刊録入藏門人洪演徒印寬彌祐徒智愷彌願徒智亮康熙六十年歲在辛丑增補入藏嗣法門人法洪普休普福祖佑語録計六卷共一百六十頁板存嘉興楞嚴寺經坊流通張舒瞻刻
