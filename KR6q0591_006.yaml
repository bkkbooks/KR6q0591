body:
  text: 嗣法門人智曇洪演照本等編詩偈和永吉賈公題古松十景韻大悲曉鐘忽聽蒲牢震梵宮清音驚起月朦朧曇摩泛海波澄靜空谷傳聲嗅醒聾赤松仙蹟何年仙子駐松洲直至於今話未休羡爾乘雲何處去尚留空閣待王侯江水靈源潺潺江水勝叮嚀滴滴靈源吐梵音星宿一泓開鼻祖岷江萬派會同津戌樓暮煙長庚初現暮雲遮玉壘煙籠古樹鴉鞏固松維盤石穩景星高拱映三巴金蓬夕照形勝盤龍萬仞丘不知名播幾千秋地靈常款高賢樂夕照斜陽適意洲風動秋聲孤峰嶮巇揚風勻六月飛霜不遇春怪石參天聯碧漢未曾涉歷便驚人雪欄霽色雪映千松玉色瑩遠山堆疊翠嵐屏層巒日涉江心渺目極平川四野青古橋春漲岷嶺融和花正開錦江一派自西來桃紅浪漲春三月躍起魚龍任往回泮水清風旭日東升麗景新風雲會聚湧波輕潛龍奮意騰霄漢共沐恩波兆晏清龍潭夜月天空明月臥龍灘蕩漾光華得一看亦任眠波千載沐澄清宇宙盡蘇難望雪寶頂寄惠宗禪德岷峰卓立萬山巔銀色平鋪別一天玉樹奇葩聯北極天然不更四時鮮登西崇山崇山天際白雲飛岷嶺峰高聳四圍疊嶂巍峨環緑水清流千古映光輝中秋同公緡李貢元賞月諱煜蟾光隱隱透窗西佳節時臨景更奇鴈入梧桐驚客夢風飄黃葉過東籬林間晏坐悲秋晚菊徑逢人憶昔時此日與君同再約一回及節一題詩九日同天綱郭先生登高邀朋徐步蹈深溪限韻頻敲坐澗西風迥偶然驚落帳天寒忽聽隔林雞閒花片片和煙碧錦水滔滔帶露齊此日欣然同玩賞松梢月掛鳥還啼達高鎮臺時清道泰暢奇哉化洽華夷拱外來松塞景星閒繫馬邊陲甲胄奉瓊杯長江泛水龍形現怪石蹲踞虎勢開翊衛皇圖千萬載恩孚黎庶育瓊苔登七層樓和卓鎮臺韻層樓翠靄若天台紺殿荊扉向日開清磬一聲雲外賞鳴鐘數下衆徘徊團圞共話無生曲聚石高登說法臺此日拈題元不爽臨場奪卻羡英才中秋同又廉楊貢元玩月諱繼震零零花影實堪奇娛目賞心興不移談笑語聲喧北極忘情賓主醉東籬白雲片片浮青嶂冷露涓涓墮葉稀欲得騷人重再玩仰瞻明月賦新詩達古松衆文學原韻曲星昨夜襲禪廊借彼群英悉舉揚玉帶不妨垂勝績芳聲自此永昌昌慈氏樓同子儀楊春元賞雪諱蕃彤雲昨夜掩嬋娟銀色平鋪景更妍岩挂鵝毛舒錦繡山披鶴氅映珠簾森森碧樹凝霜露疊疊層樓樂自然極目今朝觀六出挑燈靜夜把詩聯山中四威儀山中行拄杖緊隨身過橋來驚起隴頭人山中住長年不出戶渾忘矣不知春幾度山中坐細草為茵褥剛揖眸猿猴攜子過山中臥衲被蒙頭裹才伸腳好處都蹬破題雪山四景碧霞池石瘦苔封映碧砂池中紫霧湧丹沙波澄月靜空張影轉盻晴雲覆彩霞水源洞水晶噴出老龍涎響徹青霄格外天萬派淵深從此出更於何處聽流泉梅花松玉質蒼枝總不催馨香馥馥暗飛來平生不借東皇力天然秉賦暢優哉湧珠泉疏林湧出一珠泉萬斛明珠賽月圓更有曠觀分外別始知仙跡不虛傳和鎮臺周護法遊雪山寺誰向岷巔闢洞天四時花雨遍山川晴開野壑千峰秀泉湧波翻五色蓮眺望頻瞻銀海近沉吟微覺白雲連塵寰莫謂無仙跡步到黃龍信有傳遊金華寺三峨和尚丈中修竹喬松接緑陰雲霾澗底有人行牡丹檻外如相識搖拽輕風笑不禁次摩提法弟牡丹韻獨坐招提監法幢蓉城日晚燕成行仙源品格連珠玉國色清奇蔭碧窗緑葉芳菲彰錦繡青枝初綻壯名邦滿斛金珠難約價惟將一曲和仙腔次倚天法第牡丹韻天然國色興偏多占斷煙波賽薜蘿眼底朱顏光燦爛枝頭玉露影婆娑曾經風月元如洗落照媸妍豈礙磨勝日不常重再玩高歌一曲訊如何夜雨懷舊淋漓靜夜灑床頭尋思鄉關旅夢稠半浸芭蕉來上客情偏向世中周一松吟寄贈如桂李護法諱永秀獨羡山中掃雪人結茆相伴爾為鄰多年長就參天勢直向煙霞接紫宸題雙松贈松潘衛劉護法諱印祁茂密巍峨分外幽參差劍閣接煙浮根深固結虯勢幹古天然飛鳳頭湛湛甘霖添沼碧嗈嗈琴韻吼春秋思君不畏嚴霜逼幰蓋施張映帝州錦江思歸黃鸝協雨啼深谷紫燕銜泥薄暮飛花綻春風雲冉冉晴連芳草冷依依身悲澗道垂憐少名薄錦江達者稀不識天涯寥落客松門歌鼓幾時揮自勵寄錫閻浮五十春塵頭土面罕知聞佩懸祖印評宗旨欲望承先啓後恩片片白雲浮碧嶂行行野鳥噪嘉音錦江對卓頻拈舉那管前生與後生題通天神樹寄奇育周護諱瑛堂堂突出採月霞翠色蒼蒼錦繡賒月泊通身披玉鎧風騷遍地展英華長懷報國芳名遠卓立參天泛碧槎幾歷烽煙猶不改凌霄氣志總無斜訪金繩靈樞和尚策杖穿幽徑林豐信步遲流泉凝欲斷岩掛玉藤藜薄霧和雲宿璣珠伴鳥棲精舍猶隔遠雞犬已聞知訪文玉白檀越用袂會經數十年西林皓月復重圓三空及第潛幽谷一字全無石上鐫語笑聲從雲外樂詩成意向雨中聯雍容丹鳳藏梧樹何日騰霄啜醴泉除夕轉盻斜陽三百六須臾已過又重添林間幽興宜偏賞客舍臨筵起慕煙四海雍熙歌有道萬家燈火樂餘年今宵抖擻枯腸也寫罷重題賦一聯宿草堂寺吼一和尚丈中數里松陰夾路生空山雨歇晚煙輕疏鐘隱隱敲殘葉月到藝窗分外明題桂花寄侄沈公亮諱國卿暫借西風薄暮煙臨空紫萼木天然輕搖細細花苔軟卻恐人言道別傳寄子晉胡檀越諱世芳時到魚腹枉施功幾度追思蹈蓽蓬手扎半聯隨世轉故人猶憶陌衢東聚頭始悟多生約解袂難分拂影蹤等閒嗢噱冰衷冷是夕音書附遠鴻思親涉歷優遊為本支幾經風雨未承時慧刀欲斷三生愛陋質憑添兩鬢絲倣佛無由揮緬想依稀何以慰幽思當年自信逃禪誤憶毋膏肓不再醫尋梅寄丹景山石梅和尚見說梅花彭邑好不辭策杖蹈東林幽人雨後慵拖履高士風前懶抱琴一曲閒吟香撲面幾家還共玉為鄰此回難盡探奇興他日邀朋再水濱插秧口占賦寄清渤戒徒時當清泰兆豐年細草初肥帶曉煙手撒秧針針白日足登水面面青天周旋不駐情偏曠俯仰猶期興轉便及致臨塍聊一望雖居後面在人先早春寄東輝法第群鴉共噪庭前柏報到南都氣象新幾樹梅花香襲襲滿天瑞靄羡松勻友人見訪歲月居諸幾驗韶惟將病骨傲塵囂何期秩秩鸞儔至道蹸翩翩聲價饒共話窗前如幻夢寫情言外樂風霄優遊逸興忘晨旦未擬江皋鶴唳遙祈晴頻瞻霢霂苦淋漓海宇桑田若飲醾播耨鮮能持耒耜甕飧須折炊扊扅乾元幹九多逾律坤后含生屢越時半稔盈流無間歇蒼靈何處控無私謝晴陰捲陽舒六極和漁樵共賦彩雲歌藍田玉粒含芳碧青幹奇葩展緑蘿燮理四時欣讓畔無虞八表偃干戈群黎贊育忘私畝化日均霑頌蓼莪元旦值雪凜凜寒風遂霰飄琅玕歷落勢撐霄至哉六瑞宜天塹偉矣八延織錦袍一日舒成周海嶽群黎欽仰語聲高如斯花甲從頭數稽首偕將帝闕朝遊峨眉山宿洪椿坪勢結生成別一支層岩聳翠野雲披石花有趣陳苔砌山脈無情斷雪肌素壁餘塵風自掃疏窗駒隙月來晞柴扉大啓頻邀客我亦登臨醉酒卮春日自嘆自嘆浮華四十春每逢惆悵意國循桃花凝露香案柳絮牽風影拂塵一片閒情同寂寞數莖修竹共身貧幾回欲向青陰裏尚待林梢月掛新宿法藏寺策杖來峰頂登臨眼界寬霞峰積翠色古木繫晴嵐山寂多猿嘯澗寒少客攀追思猶尚在令我幾盤桓除夕一刻分新舊何云鎮夜眠疏鐘敲殘歲爆竹響青天井藥沉蘇酒椒花墜錦箋傳梅催羯鼓一律羡韶年御書樓危樓高紫極陟彼曠懷生目縱天涯遠心含太古清香雲凝野翠月影映江明靜睹天顏襲嵩呼萬萬聲中秋同玉泉融徹和尚玩月鄉關隔數里佳節孰同歡桂子烹茗酌天香入座繁溪深流月過衣薄覺秋寒感慨情無盡敲詩永夜看懷問海禪師客歲分襟榴火天今朝幸遇中和節依依憶我折梅人不覺心思唇齒熱喜雲樵法第詩昨度禪房話片時仰承筆底賦新詩嘉章百讀情何好愧我才疏學步遲閲浩生法第來詩獨坐藝窗日已遲三唐評詠憶君詩佳山一片風雲際仰賴調羹大有時懷法旨法第憶昔承君折柳枝近來又是暮春時幾回蝶夢臨書帳為甚雲山路轉迷懷海月禪師兀坐軒窗憶昔時堤邊依舊柳垂絲傾懷難罄瀟湘水直至於今覺有思夜雨懷胞弟青永茂志老天涯蝶夢清微風動處柳煙輕撥爐卻憶同胞友厭聽床頭漏滴明待舟晴川閣為尋野寺過晴川落日江頭問渡船聽得幾回歌舞處漁人晒網夕陽邊苦雨口占經旬冷雨暗身凄靜夜愁聞杜宇啼故國思成千里恨何時得到斷橋西題庭桃賦首座遂菴法弟名園百卉未競開獨羡桃顏笑滿腮艷麗夭夭添喜興含煙縷縷倩誰開奔𧊵有憶忙沾絮蛺蝶尋源繞緑苔任是東皇催太促一枝偏待故人來題秋蟬賦西堂紫成法弟暫棲緑柳不停機盡日臨風雙影微幽永欲裁遷樹賦殘聲猶憶別枝肥披雲帶霧吟何切飲露餐霞曲調稀每值夕陽音正茂松梢月上冷依依題秋蚊賦悟月法弟鎮日嗡嗡未息機生涯只在一針微早從芳草埋形跡夜暮梅花帳裡飛心慮煙蒸雙翅掩身寒露重五更肥看伊冷落秋風後快便佳人夢不歸題秋鴻賦青松法弟空齊兀兀自忘機鴻度幽庭西掩微鄉國書來秋正好湖山霜落月初飛食殘沙岸栖寒近夢入蘆汀宿影稀表格為儀憐旅邸故園遙寄一音歸題秋螢賦慈恩知藏囊螢稚子浸投機個個幽陽出翠微雨歇飄飄穿竹徑風輕鬱鬱傍人飛更沉起伏隨高下曉唱栖遲出四園自是堪憐秋盡後不知何地好知歸送文煒法弟還錦城無限驅馳意若何旅情又和唱行歌知君欲玩錦江月莫厭松州山水多春日晚眺柳拂依依繞寺門梨花夾蝶染苔痕日斜風迅聞鴉噪見得孤幡過遠村青山一片雲極目蒸煙迥雲封幽谷中松聲疑詠遠鶴唳似鳴鴻雲霽舒玄妙晴深贊化工每值和風作花笑影重重書扇寄古樵侍子攜籃採蕨莖林端狎虎卻無驚嶔嶇忽轉平臺上一望山河大地清寄贊廷余檀越諱之佐馳驅衡雪足如珂碧樹懸泉陡澗多朝暮嚶呀來百鳥一庵頻插鳳兒窩密旨西堂蛇虎縱橫攜兔角醯雞𨁝跳拂龜毛秪緣碌碌錐禪子攙撥須宜手眼高酬奇育周護法探梅高誼詠東風照映愈輝卒歲功雲護石床蒼翠合客遊亭閣興猶同名花夕玩圖南圃新筍春生舍北叢一學坡仙留玉帶且憑詩酒醉山中遊峨眉山次可聞和尚韻登陟頻移杖微茫汗漫傾燈傳更漏靜光放霅時晴靘冷停蒼雪茶香煮瀑鐙都來明旨趣岩畔禮空生登峨山極頂次懶石和尚韻極頂還餘雪漫空積地存夢魂清到底塵事勿須論竹折禽喧雜廚香虎共蹲詩題休冷落蘚石去苔痕遊嘉州大佛寺嘉陽門對岸大佛頂凌雲江急灘聲遠峰高天際分鳥鳴三匝樹魚躍一池沄彈指雍邪正何須著六群上中岩寺次竹鏡和尚韻驀上中岩寺江山一覽窮觀心舁佛祖拊掌躍魚龍鳥唱伽陀韻身居般若叢優遊天一角石筍插雲中賦寄瓊目和尚帶得餘香繞萬年嵯峨風色景宜便花陰鳥度雲來處樓外人歌落日邊短杖放蛟騰白水重岩垂瀑掛青天推輪此際堪題柱祖席無湮啓別傳次文睿和尚牡丹韻結搆春晴玩賞時乾坤何物不幽思易常弗變煙中色迥絶那堪雨後姿詠托清芬瞻日月賽教素艷亞麟麒日斜醉倚闌干夢未讓蓬萊宮闕肢次琳睿和尚牡丹韻越世名葩更可論瑤階得句絶紛紜未前載筆開香粉已到傳書潑墨雲多謂佳聲原自古頻將逸色卻無群晴窗共客天回轉一座留觴把韻分寄古松諸山法友並衆鄉耆藜杖移幢十載過相將無奈祖庭何鹽梅日逐陪迎送禪衲時敲苦切磋萬派山光藏佛眼一腔心血洗天河回環不斷常留