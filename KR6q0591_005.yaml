body:
  text: 嗣法門人照隱法洪等編行實一日課畢監院實悟率諸子詣方丈請開示行腳師曰余生來鈍根薄德豈有行腳事耶諸子云從上老古錐於語録傳記中俱已載明和尚不吝慈悲悟等願聞其要師不得已而言曰豫乃松州人也父姓沈諱綸母任氏生於順治十七年庚子四月初八日辰時當晚母偶得一夢見大悲菩薩與母言曰此子非在家根器不可久留宜取善名吾當去也母覺常疑在心余未滿一月病至旦夕余母對祖母云夢中之事祖母詣佛前焚香默許出家即日病愈至周歲送禮本城妙覺寺如山師為徒後至生慧和尚座下圓具一日受檀越請念法華經至父少兒子老便有疑心無處請問遂辭親出松參昭覺丈師翁師翁一見問云在那裏來余曰松州翁曰會見智中國師麼余曰見翁曰與汝説甚麼來余曰起居和尚萬福翁曰不謬國師之裔苗余乃禮拜翁曰喫茶去後入方丈請益命參本來面目如懷劫石相似依座一載辭歸翁命侍者送字一幅紫微山下彌陀院玉壘為距漳臘頭云是智中國師寺蘭孫桂子八千秋於越明年甲子掩關每看古人公案如銀山鐵壁一般三載後復參昭覺時本師老人主席余參見問本來面目師直打出方丈一日余汲水偶見師師以拄杖橫截路云挾路相逢時如何余震威一喝師連打數棒余胸中更添一塊頑石相似遂發願若不明此大事至死永不倒單一夕五鼓忽聽報鐘鳴覺得有些快活天明入方丈呈知解師不顧余大喝一喝拂袖便出師云只恐不是玉是玉也大奇隨後出三則公案驗之余立領師然之解制出源流拂子余再三卻辭師云此事從上來的非老僧本意何得不肯承當他日支吾道之傾頽作人天之標榜余乃受之老母高年命胞弟接回復掩關三年畢重興無量禪院後主雪山法席於壬午春本師老人年登耋齡難以應酬發正義實悟洪演法洪等不遠千里至松敦請余主持昭覺祖席先德云父召勿諾君命召不俟駕而行隨即莊束恭趨座右於佛生日會集通省當道宰官紳士諸山檀越闔堂頭首撾鼓上堂主持院事酸風苦雨千磨百折無不經歷迄今十有餘載難以枚舉此是余數十餘年出盡醜態今日被諸公逼迫不得已自揚家醜盡情吐露恐遺笑識者唐突大方天寒毋勞請各歸堂機緣僧問溪聲盡是廣長舌且道所談何事師云如是我聞問山色無非清淨身祗如無山色時將甚麼喚作清淨身答云海闊從魚躍天寬任鳥飛問夜靜更深萬籟俱寂雪山頂上因甚麼鐘鳴鼓響答云竹密不妨流水過山高豈礙白雲飛僧休去問昨夜三更禪堂火起燒卻山僧腳指既禪堂火起為甚麼燒卻山僧腳指衆下語不契自代云山僧罪過昭覺本師老人除夕問年盡月盡日盡時盡只有一事不盡莫不是穿衣喫飯莫不是屙屎放尿麼請代一語師云俱在昭覺裡復頌云瞬目揚眉恰是時生平未了大家知穿衣喫飯尋常事款客迎賓更是癡問新年新月新日新時説話俱是新的犯舊者罰師舉茶杯云請茶頌云春霄一刻直千金事事拈來格外新爆竹一聲催臘去昆蟲草木盡知音問守歲至夜忽聽籠雞一聲呸道好個消息竟被伊漏泄了也若不是被伊漏泄可稱禪狀元師打一圓相於中點一點云作麼生會復頌云聞聲動我一聲呸露出元享消息來遇適東皇傳正令微微一點露三才齋堂粥後一僧問若喚作一黃虀入地獄如箭射不喚作一黃虀入地獄如射箭師云口是門僧問雪覆千山因甚麼孤峰不白師云瘦處難瞞僧問虎以肉為食因甚麼不食其子師云無他下口處進云貓以肉為命因甚食其子師云食得不為冤進云魚以水為命因甚麼死在水中師云隨鄉入鄉晚課後時寧唐居士進方丈請益問今日弟子入山特請和尚些新鮮佛法師云若論新鮮佛法山僧近來有此三問請居士道道看師云溪聲盡是廣長舌且道所談何事士云隔斷紅塵三十里白雲秋葉兩悠悠師云山色無非清淨身秪如無山色時將甚麼喚作清淨身士云靈光一點徹太虛師云夜靜更深萬籟俱寂雪山頂上因甚麼鐘鳴鼓響士云人傑地靈師云只恐不是玉是玉也大奇士拜退分燈德雲實悟雪山雪映梅千樹昭覺滋培萬顆松吩付闍黎擔荷去高提祖印闡吾宗有堂德紀當陽一句絶思微鐵額銅睛莫敢窺獨許獅兒親見得等間撥著奮全威敬懷正義昭覺爐頭烈焰紅人天魔佛盡潛蹤機先不讓摩醯眼聖箭才施透九重洞初照念驚群出衆個獅兒佛祖機關分外奇萬古徽猷從爾振全彰正令福坤維佛旨性惠金毛獅子出林間遍界群魔百獸潛直下承當弘祖道吾宗千古賴君傳自天彌祐直指單傳佛祖機拈來覿面付獅兒此時喜得龍聚正令全提孰敢欺達天彌願機先覿面法堂前顯密全彰豈等間七尺烏藤吩付汝羅龍打鳳任君傳心一慧性師資覿面絶商量時節堪承理自彰肘後點開宗正眼徽猷千古振綱常大馴教譯掀翻海獄泄真機徹底從頭説向伊歷歷明明分八表中秋一月任光輝多聞心學宇宙橫身意氣彰騰騰杲日正當陽巾瓶契悟傳宗旨裕後光前一瓣香雲光照果昭覺爐頭法戰先橫身鍊出赤花斑錦鱗越格超群象正令全提續祖傳尚志惟徹驀劄相逢執一錐等間摸著露全威分明托出娘生面鳳子龍孫一派歸崑崙寂乾昭覺出個赤尾鱗張牙露爪行門深再來瓦山辟支佛大振吾曹八百春密旨洪演杲日東升上碧巔山河大地盡昭然元明出格超群象法令當陽續正傳瑩珠照隱精嚴密行小頭陀體佛心宗一片婆七尺烏藤拈付汝攪渾大海泛紅波法燈祖印杖頭落處雨花飛瀛得清風當下歸吩付闍黎收挕住龍驤虎踞奮全威北丹福容昨夜虛空開口説梅花幾點泄真機闍黎獨奮摩霄翊一翅鵬搏天下知常潤奇育周居士烜赫圓明六不收輝天鑑地諳群儔輕輕點著騰霄漢一翅鵬搏天下周遍空法性選佛堂前驗己躬闍黎薦地亦非同人天衆前親吩付堪與吾曹立正宗曆山明宇鄭洲蘿蔔過錢塘蜀地生薑滋味長吩付闍黎收挕住崢嶸頭角驗諸方國寧常靜巾瓶念載拂勤勞薦地精明露赤稍甘露門開撾毒鼓銀河玉浪泊天高性一照空一句分明道得真新羅鷂子過南宸等間摸著娘生面特地清風肘腋驚雲芝妙福指揮正令坐重圍夜月當空處處輝㘞地一聲心膽碎個中消息許誰知奇彰福印昭覺堂前赤尾鱗櫛風沐雨出魚津有時騰濟青霄外指日人天共仰欽國璽常胤隨侍老僧已有年赤膽忠心行門堅法身邊事親擔荷千古芳名上祖傳便聞普學昨夜峨嵋笑滿腮闍黎功行立三才磨磚句子親吩付一箭當陽遍九垓常育聯登方居士幾向叢林共寂寥忽將己事囑英豪芳名已著祖圖上他日吾曹起鳳毛悟參性德痛棒打人寒徹骨曹源水泛一溪冰滿天星月分明照露出金毛匝地施常齡應高喬居士無文句子羡芳名壽等吾儕渤海深選佛堂前親授記蘭孫桂子八千春國鑑照緒叢林重務爾能持生怕逸麼日用時放下身心勤苦行龍天一定不相欺潛修勝悅春雷一震露全身頭角崢嶸紹祖燈吩咐闍黎親剔起高懸祖印接群生常明國鄉沈居士赤尾金鱗鼓浪傾綸音敕上九重城靈山有約堪承授大起曹源繼祖燈軒然照玉琉璃瓶子佇朝陽薦過磨磚瞌睡玉喜得東風生肘腋一燈千古永傳芳靜山海福中興句子囑獅兒保壽生薑莫放逸探得梅花開嶺上芳名千古立弘規壽昌通福昭覺出個赤眼鯉張牙露爪絶人疑有時獨步鰲頭上攪得長河現緑龜大仁常懷居士多年昭覺布精微養就含元伏鼎威莫教等間時放過芳名千古入傳燈明璽法光透網金鱗密大機龍驤虎驟雨風馳老僧略露鋒鋩句覷破闍黎鐵面門悉聞芳靜指揮如意天花落號令人天佛祖機吩咐闍黎親薦得個中消息許誰知覺先靈悟父母未生鼻孔兒子宜的的驗精微有時拈向人前覷不與世間分外奇靈默法洪楊岐盞子明千古保壽生薑辣萬年昭覺堂前獅子子逢人不讓老東山燦然教慧嶺南一句傳千古昭覺時拈接象龍收得五湖風月盡憑撾毒鼓恁之呼隱菴智曇岷峰突兀萬山巔挨落天邊月一圓吩咐隱菴曇上座好生收起挂堂前如水證智吾年半百收英豪種草分明起鳳毛莫道老僧心眼毒從來佛法不相饒從聞道慧二千六百餘年事囑子明明契祖機更有一番新氣象高懸赤幟闡吾規明旨嚴通金剛王劍露吹毛拈向人前顯六韜若個知音能薦得安心法要囑英豪圓一普休大智原來顯大機師資妙契芥投錐安心句子親拈示堪與吾曹立聖基聞旨覺福一聲雷動泄真機報道闍黎鼻孔知不是老僧唇舌特弘開大冶育群迷玉如慧明法王法令吼如雷祖道全憑八面威從上事兒親囑付一天星月燦坤維岷松常岫駟馬橋頭浪泊天魚龍跳躍出波瀾鯨鱗養就摩霄翊乘勢高飛八大淵恆安福清威鳳山前鼓笛高聲聲韻出鳳凰巢承虛接嚮弘吾道莫負深淵上九霄建菴照鼎昭覺中興法戰場子宜的的叩心王南詢句子親吩咐指日聲名四海揚抱拙照本昭覺堂前舞赤梢未曾點額氣翀霄老僧不是間狼藉喫著令人骨格高古樵實學清霜徹骨不同常薦出元初一點光探得梅花香嶺上山河大地盡回陽乾輝印朗雙桂馨馨吐遠香奇風拂電展經邦分心句子親拈付指日聲名韻八荒鑑輝印寬曹溪正脈囑兒孫歷代冤讎理不伸從上來源親托付子宜的的振家聲林菴海圓虛空得得口喃喃報道闍黎鼻孔穿大地山河分八表森羅萬象盡昭然常虞席居士頻吞氣宇大雄場天眷麟兒五福彰秀出宗猷能丕振如天化育自芬芳恆容通智精誠一念振宗風格外提持迥不同祖佛家私親吩咐逢龍遇虎播吾宗可雲海福闍黎骨格迥非同氣節昂昂啓桂叢從上事兒親托付芳聲千古振宗風金緣本來高懸古鏡鑑群雄萬象臨筵仰正宗佛祖鉗鎚親囑付紹隆聖運繼真風印芳明長參禪學道緊施功薦出磨磚過量翁時節堪承酬法乳吾宗法道賴流通全慧圓偈分明的事赤條條囑付麟兒薦六韜踏著龍頭即虎尾搖風簸雨始稱豪天文通徹昭覺英才氣相先老僧鞭逼向人前臨機撥著鐘何魯雙桂家聲韻八寰松谷普慧鐵牛奮迅出玄關踏遍溪山得飽眠昭覺爐頭親煆鍊家私露出幾多般燦文照全燈籠𨁝跳舞三台露柱聲聲讚善哉喚起東村王大伯揚聲天外鴈飛來祥臨普慶金剛圈兒才拋起網得闍黎鼻孔疼九上三登梅子熟拈來猶許個中人通傳達本拆腳鐺安三個石地爐搰拙響青天老僧日用尋常事吩咐闍黎接半肩素修照誠紹祖山前鐵鷂飛四來狐兔盡藏威金剛王劍親拈遞殺喝臨施佛祖機慧然普福錦浪回文韻八荒九重春色占朝陽闍黎得得行將去遇子時拈耳順香普霞慶注烜赫圓明六不收金剛王劍驗群雄老僧拈柄鐵如意立必生蛇化毒龍見性心明東山鐘鼓響乾坤昭覺爐頭著一丁大好向前雄獨步揚聲天外鬼神驚非相達性春風舞起巖南花獨許靈雲見處嘉吩咐闍黎親探得滿天星月照中華秀雲如春鐵笛數聲滄海震長天一色秀雲騰寒山滴雪梅花放識道闍黎時是興朗徹興照霜衣雪鎧念餘年喜個人來接一肩紹祖家私親托付堅修密行妙中玄祥旨覺瑞峨眉山月照錢塘錦水清流萬古香吩咐堂前獅子子收來立極展經邦慧如明通爐頭獨坐默無言忽聽堂前報板傳問是阿誰那一個明通點額上長安沖石真閏禾山卓鼓響青天保壽生薑辣萬年珍重闍黎莫放過燈籠𨁝跳露三玄德容普宣冰清玉潔個頭陀肘後神符薦出鵝探得嶺南梅子熟翻身直入鳳凰窩蒼雲清福蒼雲出岫佐南宸子夜星垣拱北溟吩咐青巖福上座好生接物利群生恆璧如固佛祖家私親托付時時如固眼中珠子能的的弘勤業遞代冤讎藉祖圖月輪登佑穩坐蒲團現月輪清登直上九重城鳳凰山裏無毛鷂拍翅高飛入帝京心一意定代吾説法利群生珍重芳名入祖燈柱杖橫施三五略嘉州大象血淋淋畸賓福煓生薑公案效前賢莫當尋常赤肉團苦辣酸酣分付汝四來龍象任同參天仞普鑑師資默契奮全提直旨單傳向上機大渡河頭垂釣西天東土盡鈴窺百川常容闍黎獨得行門堅隨侍老僧已有年昭覺火爐頭子好生珍重繼吾傳參徹玄極侍吾辛苦效前賢薦過盧能壁上言選佛場中鯉興波濯浪驗人天莊嚴真壽嶺南葦屣傳千古濟北佳聲諦萬年昭覺一枝正法眼彌牟陳上接人天盡知普智大愚肘後還拳事昭覺時拈接象龍分付盡知智上座燒吾香代立宗風東傳祖佑西乾一句鳴千古昭覺爐頭煉赤斑更喜龍門騰躍疾吾家宗譜屬東傳
