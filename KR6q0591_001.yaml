body:
  text: 嗣法門人實悟德繼編壬午年二月初四日於松潘西崇山無量寺受本師手劄及本省當道文武諸大護法概同門昆眾兩序諸山紳衿檀信等公啟請主昭覺辭眾上堂詣法座云親承師召難已措辭昭覺門庭豈容擬議是則是也要兩得相稱拈啟云者個是老人親書不是畫餅四字命正義洪演常印常仁彌佑法洪等不遠千里而來專請續頭陀上祖庭主持法席的一道公券不妨對眾拈出宣畢便陞問答不錄乃云東風拂柳杲日騰輝玉壘山頭剛剛伸出摩霄手白蓮池畔聲聲識的地頭人不惟本願應老人命真續於此卓席四十餘年幾經辛辣方成法社意欲桑榆故里絕志林泉誓不與人敲枷打鎖唐突大方蓋謂老人年登耄齡難已應酬湥念化門撐柱乏人只得揚下鈯斧子掀翻折腳鐺不敢違命荷擔佛祖大任古德云去即是住住即是去去住自由人天乞命顧眾云我本無心有所希求今此寶藏自然而至喝一喝住昭覺入院三門云乾坤作殿日月為門八字打開亦任縱橫王令甚嚴投明須進續頭陀到此出入無禁彌勒睹史陀天別後昭覺寺裏重逢明州市上幾多年一物渾無布袋中天王物我同仁赤膽忠心輔弼叢林內外肅靜起惡心者遠百由旬四方常擁護令一切安穩韋馱同氣相酬同聲相應雲從龍風從虎聖人作而萬物睹佛殿老瞿曇威雄凜冽續上座歷戰沙場二尊宿誅茅僻土奠立封疆不惟光前裕後亦要判驗諸方伽藍律令森嚴主賓互換君臣道合至化幽顯賞罰分明興祖域安邦定國弘灶鑑祖師應機接物以法利生魔宮虎穴劍樹刀林吞從今結個忘年友起坐逢迎不讓伊詣座云寶華王座獨露當陽到即便登有何回互卓拄杖一喝便登拈香云此瓣香德配天地道貫古今篆則光吞宇宙薰則瑞靄乾坤爇向寶爐祝延今上皇帝聖躬萬歲萬歲萬萬歲伏願帝德巍巍四海祝無疆之壽皇風蕩蕩八方歌大有之年再祝儲君王子輔相大臣滿朝文武闔國公卿永作擎天玉柱常為架海金梁九流共沐百藝咸霑此瓣香柄寰中之化育權閫外之樞機恭惟本省文武諸大護法推願擁山河於百代衛社稷於千秋柱石宗門金湯法化此瓣香凌霜傲雪四十餘年今日囊藏不住只得和盤托出此是第一回拈向爐中供養本堂御書樓傳臨濟正宗第三十三世上佛下冤本師老和尚惟冀壽算彌堅轉不生不滅法輪德嶽崇高現無去無來法身斂衣就座上首拍椎竟師以手作托盤勢云和盤托出大家看智鑑光寒不夜天殊勝殿前雄一步一生竟不受人瞞眾中有不受人瞞者試出相見乃云錦江波煖喚回天地公心雪嶺風清吐出乾坤正氣孤峰頂上龍吟虎嘯選佛堂中鳳唱鸞吟應老人命不顧危亡於斯開單展缽建立天童宗旨闡揚昭覺門庭所以法不孤起仗境方生道不虛行遇緣即應法隨法行法幢隨處建立要且無事道人何妨單瓢隻杖若欲超宗越格直趨萬仞峰頭權衡佛祖號令人天不惟光揚祖席亦且不振家聲新長老到來還有為人處也無卓拄杖云孤明一鑑皆驚駭真勝全歸掌握中據室應機接物以法利生佛祖規鑑互相傳持灰頭垢面開人天正路逢場作戲轉根本法輪白棒麤拳立叫泥人作佛紅爐烈焰郎使鐵面寒心天上人間何妨垂手魔宮虎穴亦任橫身金獅子踢倒銀墻直上梵天玉象王撞穿鐵壁喚也不回十方龍象兵隨將轉滿堂雲水令逐符行續上座據此把斷要關不通凡聖拈拄杖云放下缽盂不安把柄上堂問答畢乃云呵佛罵祖毒蛇頭上揩癢說性談心饑鷹爪下奪食昭覺無事討事向虛空掘洞活埋萬里雲煙滿堂雲水薦取碗底箸頭掃卻支解根蒂那管他東家牛滲卵西家馬出鵝羊擇乾處尿驢揀濕處屙咦是橋頭西石土地口口聲聲羅羅哩阿呵呵也大奇路逢劍客須呈劍不是詩人不現詩咄咄咄中元上堂秋潭月影靜夜鐘聲一段光明靈靈不昧到這裏步步踏著三賢膽顫十地魂驚呼喚不回牢籠不住如壯士屈臂不借他力方許少分相應脫或依稀便是落空亡外道魂不散的死人塞耳偷鈴以徒自欺果爾眼裏有筋皮下有血不妨相視不得門傍戶聚頭妄誕趁慣時光以當了事禪和者哉瞞碗底筋頭與諸人公驗分明在縱饒千聖出頭來終沒交涉必盡鏟除動靜絕跡潛蹤一句作麼生聻真金不怕轟天火爐燄豈藏蚊蚋身上堂老瞿曇拋磚引玉迦葉婆承虛接嚮正法眼藏委在今時般若真燈輝鑒斯日所以金鳳不群具五色髓現大人境具大根器直下承當無向無背全身獨露絕聞絕跡於一切處不為一切所拘如斯韜略則百千法門無量妙義一彈指頃轉大法輪建化法中斯為可矣若論衲僧分上只向懸巖撒手劍刃橫身娑婆擲向他方妙喜拈來此土不假思惟悉皆具足且道承誰恩力得恁麼奇特良久云青山況是吾家物不用尋家別問津結制通省會眾姓營齋請上堂詣法堂指座云佛祖門庭人天標榜最初一步踏著直向千峰頂上且道是甚麼人行履處卓拄杖云高著眼遂陞拈香云此瓣香光輝海嶽瑞兆權衡威音那畔拾來人天眾前捧出爇向爐中祝延今上皇帝聖躬萬歲萬歲萬萬歲伏願帝德崇隆聖躬彌固再祝儲君王子睿算千秋輔佐群臣高增祿位此瓣香貴則娑婆價滿賤則掌內無文爇向爐中奉為本省文武諸大護法十方檀越現前眾等同承般若之正因共證金剛之種智此瓣香不產陸地豈屬陰陽篆則玲瓏八面結則八面玲瓏此是第二回拈出供養本堂御書樓傳臨濟正宗第三十三世上佛下冤老和尚用酬法乳之恩斂衣敷座維那拍椎竟問正令既輝洞口釣竿垂下灘頭赤尾金鱗如何得取師云一釣便上進云垂絲千尺意在深潭鐵額銅睛如何抵對師震威一喝進云和尚陞座眾姓設齋施者受者功歸何處師云謝供養進云恁麼則禹門三汲浪平地一聲雷師云也是無端特地問明心見性如何不得禪定智慧師云因為汝有禪定智慧在問八百獅子吼秦川地搖六震因何終南山不點頭師云不是故鄉人不親乃云玄機獨唱千聖難窺截斷眾流萬聖莫測舉起天回地轉放下草偃風行山頭鼓浪弘開選佛期場井底揚塵高建煆凡爐韝掀翻海嶽平匡佛祖大機絕透玄微揭示人天正眼真元湛淨足跟下嚴霜凜凜智鑑精明眉毛上杲日騰騰以一統眾穿窠穴於毫端補短截長握秤尺於掌內前後際斷始終不畹到這裏人天膽落佛祖心寒不妨虎口橫身亦恁懸巖撒手且道坐斷當陽虛空失色一句作麼生聻喝一喝云意氣不從天地得英雄豈待四時推上堂氣判元初始終不離於當念象分造化自他不隔於毫端無邊剎海全現一毛頭上涉世古今總歸寶王剎裏當軒坐斷還他水泄不通八字打開亦任揚塵簸土掀翻大海摟碎虛空處處本慈氏樓閣堂堂具善財莊嚴挨到這裏沒當也須借路傍通縱饒臨風快便未免拂跡成痕橫按拄杖顧眾云劍為不平離寶匣藥因救病出金瓶上堂宗乘一舉宇宙生輝正令當行乾坤失色全放全收枯木中龍吟半開半合懸巖上虎嘯應用捲舒隨機赴感到這裏何妨橫肩拄杖豎挂囊瓢端坐齋堂普同供養且道施者受者如何得相應去顧眾云一念純真非分外散心雜話實難消元旦上堂盡大地是國王水土無一物不受王恩盡十方是諸佛道場無一日不為佛事莫有知恩報恩者麼顧眾云是我臬臺劉公大護法仰瞻高厚追念昇沉虔捐清俸憲駕親臨雲集合堂僧眾登臨大雄紺殿諷誦七軸靈文頂禮千佛寶懺以斯善利酬不酬之德報不報之恩光輝祖席滋培慧命所以皇天無二道聖人無二心如天普蓋似地普擎別是一種三昧王化佛化兼行現大人相轉悲運心調元自化恩育陽春遂爇檀片云願祝仁風歌八表佇布帝眷錫三多上堂玄機展演只貴知音正法舒彰單明向上正玉轉珠回機先活潑人人鼻直口橫個個騎聲蓋擺脫身心絕無回互何須雲興百問徒勞瓶瀉千言處處振濟北家風頭頭現本來面目喜樂清平歌宣盛化頓空三際橫遍十方一念不生前後際斷正恁麼時還有商量處麼顧眾云當臺一鑑明如日萬古晴空絕是非解制上堂判驗往來一條白棒大用頻施玄機獨唱不落窠臼全提向上八面玲瓏了無遮障豎光明轉正法藏頓令人天不落埋藏遍界無影觸處全真鑪鎚高建拔楔抽釘不容擬議當下分明拂一拂云逢人且說三分話未可全拋一片心四月八上堂問大覺世尊初生放光動地昭覺如來降誕是何祥瑞師云兩彩一賽進云古佛今佛同也別也師云瞿曇不先山僧不後進云惟佛與佛乃能知之即今降誕同臨以何法利人天師云諦聽諦聽進云說法不離多行海談經湥處雨花飛師云更聽言語轉周遮乃云黃面老瞿曇遠孫續飯袋一口慣兩舌盜盡十法界苦海泛慈航娑婆削滯礙同途不同轍兩彩卻一賽時節不相饒生成個樣賊風行草偃兮拿雲喝月虎穴魔宮生擒活捉年年惡水潑頭顱歷歷神珠遭點額昭覺今欲雪冤讎不道吾儕齊捉敗雖然如是瞿曇有甚長處丕讚如斯遂爇香云莫怪渠儂多意氣旃檀紫柏一般馨川北鎮劉護法誕辰請上堂昭覺中興法戰場知音今日共敷揚全身高佩毘盧印烜赫人天令必彰作麼生是毘盧印以手作印勢云三世諸佛於此印中轉大法輪當今聖主於此印中日應萬機輔佐臣僚於此印中為國為民我劉公大護法於此印中天保九如永作皇家柱石帝眷三多常為釋氏金湯山僧於此印中登寶王座說法利生現前大眾於此印中腳跟點地得大自在一切寒林有情無情於此印中各證無生法忍雖然如是且道結角羅紋一句作麼生道遂爇香云願將補袞調羹手大家扶起破沙盆本師誕日上堂法雨清風滿院涼桂花叢裏吐秋香一輪寶月當空照大地山河盡放光拈拂子打圓相云無量壽佛現也大眾還見麼若見不勞真續敲鐘擂鼓說法陞堂脫或未然山僧與大眾略露些子遂爇香云赤手擎拳住祖庭灰頭上面振家聲寶華堂上舒鵬翼選佛堂前躍錦鱗不惜莖眉光法化弘將大冶鍊真金今辰申慶吾師壽特敬慇懃表勝因結制上堂問爐鞴宏開宗風大振十二類眾生到來如何煆鍊師云擊碎頂門進云古德人天送供和尚通省辦齋意旨如何師云一字兩頭垂進云古人與和尚是一是二師云八兩原來是半觔進云古今句子如何親切師云惟佛與佛乃能知之進云仙樂迎上寶華座九重光裏現童真師云閒言語乃云獨露當陽傅佛祖心印正令全提開人天正眼伶俐漢一撥千轉孟八郎白雲萬里所以我宗道惟佛與佛乃能知之秪貴當陽削盡根塵掃除業識亦恁橫眠豎臥去住自由法法全彰頭頭慶快有時把住一塵不染有時放行萬彙咸霑到此虛空失色日月潛光井底星飛須彌浪滾三世諸佛傍入無門天下衲僧截舌有分且道利害在甚麼處橫按拄杖云王令已行天下遍將軍塞外絕煙塵冬至上堂碧天雲散盡清霜徹骨寒祖師西來意笑殺石欄干咄若向這裏許秪貴承當何以故昭昭靈靈耳見眼聞捲舒自由亙古亙今縱饒薦得未肯自親且道自親個甚麼喝云龍從火裏出虎向水邊生元旦上堂冰消雪解露出乾坤正氣花發鶯啼喚回天地公心萬象森羅咸霑化育山河大地共沐恩榮人人頌堯天舜日個個樂義化軒仁春色平鋪各秉威靈一天佳氣齊承恩力九有四生悉具金剛正眼八難三途共證無生法忍若向這裏會得水流風動盡談般若鳥喚猿啼歌唱陽春雖然如是且道林下作麼生話會良久云歲歲梅花和雪綻年年楊柳帶春垂解制上堂把斷要津不通凡聖放開一線還許商量且道商量甚麼良久云大眾還會麼若會不勞山僧搖唇鼓舌簸土揚塵人人分上不欠一毫有甚商量脫或未然山僧拄杖子與大眾略露些子遂拈柱杖卓一卓喝一喝云綠楊坡下寒泉美從今不臥萬年欄浴佛上堂拈拂子拂一拂云從上佛祖以此教化人天天下長老以此建立法幢昭覺遠孫以此拋磚引玉現前大眾以此就水和泥合國人民憑此一著報恩已畢脫或未然番成兩橛今辰是我黃面老瞿曇遠孫真續母難之期又兼通省會眾善特特來山供佛飯僧敦請山僧舉揚般若說一口兩舌之佛法斬兩彩一賽之葛藤雖然如是舉一不得舉二若向老瞿曇分上久以打失鼻孔即此一著賣弄精神含血噴天自污其面禍至於今回互無門若向山僧分上住在今世門頭荷擔佛祖大任堪報不報之恩以酬罔酬之德拂一拂云者個與佛同生定不與佛同著全仗此公相扶中興圓悟法窟是則也是檢點將來已是鄰家有火仰借餘光昭覺則不然向矢上加尖與諸人頌出黃面瞿曇老不羞干進真續禍臨頭鄰家有火光前後矢上加尖覺未酬端節上堂光吞萬象擲大千於方外貴踰娑婆納須彌於孔中人人具頂門正眼個個握掌上玄機真靈混合何用窮微品彙咸滋本乎自性千江一月物物全彰大用萬里無雲塵塵現寶王剎到者裏亦任燈籠起舞露柱生歡正法眼用廣流傳滹沱道全仗匡扶八字打開洞明直入且道應時及節一句作麼生聻蒲劍一揮百草裂山妖鼠怪盡潛蹤真玉宋居士建盂藍會請上堂據寶華座杲日當陽劍挂眉間虛空失色默豎拂子云拈起一塵不立放下萬有全彰攪長河為酥酪變大地作黃金踏穿峨眉月坐斷三峽水倒騎陝府鐵牛歷遍支那國土偕目犍連尊者結物外之友與現前大眾共打葛藤一剎那頃作大佛事轉大法輪且道是神通妙用是法爾如然於斯薦得上至非非想處下及空輪水際越十二類生曠劫以前有情無情一時成佛去也脫或躊躇山僧麈尾略露些子拂一拂云真玉來山結勝緣人人各獲兜羅綿金牛莫當汾陽飯喫著通身徹骨寒發化主上堂祖席中興億萬春知音竭力喜重增頹綱再振光先哲擔荷須憑過量人時丁末運像季澆漓撐住化門不落委墜是甚麼人階級召眾云雪後始知松柏操世平方見丈夫心真玉宋居士建盂藍會請上堂驢鳴犬吠祖意西來見色聞聲了明自性諸人分上還有絕測也未檢點得出聲色堆頭親見本來面目亦任顛拈倒弄豎臥橫眠與三世諸佛把手共肩歷代祖師同個鼻孔現百千三昧轉大法輪不妨奇特大眾未然山僧拄杖自倒自起去也雨弄蟾蜍口打蕉不妨疑著決中交蝦蟆鼻孔長三丈嘯月吟風徹九霄
