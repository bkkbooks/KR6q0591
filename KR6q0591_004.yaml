body:
  text: 嗣法門人發光彌願等編頌古明星悟道瞿曇捏怪豈尋常悟得明星眼一腔妙用渾無生活計至今點綴骨毛香瞿曇捏怪不尋常一見明星禍已彰當下若無通線路古今焉得臭名揚未離兜率已降皇宮未出母胎度人已畢未入營門敗路先番來復去到驢年一生解在滿天網笑殺瞿曇圈外圈拈花微笑飲光微笑古今傳一領袈裟沒半邊百萬人天齊合眼明明杲日曬中天婆子燒菴當陽一著驗分明枯木寒巖又再春肘後高高明日月宗風大振到而今南泉斬貓一刀兩斷定干戈誰向鋒頭舞太阿頭頂草鞋能救得腥臊猶不臭山河三玄三要第一玄往上彎奇中玄妙迥碧天分明了眉毛鼻孔嘴上斑第二玄赤肉團天邊摘下月一丸照見了井底泥牛吼大千第三玄月兒圓臘月梅花放鼻尖香透了赤鬚鬍兒嘴上斑第一要休懊惱藕絲孔裏任𨁝跳到手了半夜雞兒聲聲叫第二要穿絮襖鴨向水邊梳羽毛快活了家中活兒向誰告第三要黃虀好佛法僧田種芝草飽殺了大地人兒知道少馬祖三喝一喝金剛劍魔王心膽寒拈提分玄要靈光照大千一喝探竿草全身都靠倒能活不死人點啜通身竅一喝不作用管教三日聾杜鵑啼枝上聲聲血染紅乞食城歸忽見西山晚晴雪霽峰巒盡大地是一則現成公案且道如何是現成公案第一則雪覆千山因甚麼孤峰不白著語云瘦處難瞞頌云雪後始知松柏操事難方見丈夫心梅花夢破相思後亦任傍人道假真第二則溪聲盡是廣長舌且道所談何事著語云默而識之頌云洗清天地一洪波百尺竿頭能幾何帶水拖泥親薦得溪聲山色任摩訶第三則山色豈非清淨身且道無山色時喚甚麼作清淨身著語云北斗裏藏身頌云蘆花深處現童真太殺分明著一丁赫得虛空輪板齒眉毛鼻孔血淋淋忽於己躬下得些快活不敢顢頇法堂鳴序鐘舉似大眾大家得些快活各著一語並頌著語云頭上瞞瞞腳下瞞瞞頌云搬磚運瓦即拖柴腳下瞞瞞被活埋大眾於斯親薦得磚頭瓦塊坐蓮臺古人七個蒲團昭覺撞斷鐘搥且道是同是別各著一語並頌著語是定當看頌云是定當看是可何滿堂雲水唱哩囉於中識得真消息倒弄橫拈任琢磨牧牛頌曠劫娑婆日吼哮翻來復去轉途遙幾回要向南宸去只謂時人不稼苗這迴探得鼻頭穿分付山童緊著鞭十二時中莫放逸繩頭刻刻手中牽牛兒受制任驅馳涉水量山我亦隨耕得山河無寸土自然樂此不為疲幾經風雨始回頭立首山家孽性柔不是渠儂珍黑白繩頭默默暫相留半白牛兒水草邊塵囂脫落自天然六時馴伏開閒地放去收來不用牽本無罣礙亦真如石上高歌誰個拘分付山童足水草大家穩便任閑餘十無頌無根樹此樹無根覆百川無陰陽地久新鮮森森玉潔超群上露出雲梢蔭碧天無絃琴綿綿密密一仙翁韻出元初太古風不是谿聲與山色輕輕一操嚮虛空無鑰鎖琉璃缾子佇朝陽出入分明自主張八面狂風吹不入無鑰鎖向那邊匡無底缽缽盂無底口朝天幾度濕來幾度乾惹得人天來飯供不知那裏是含元無孔笛一聲太古韻青霄奏出威音那畔韶六律五音知不得明明歷歷分三要無縫塔白雲深鎖玉玲瓏歷歷明明八面通坐斷當陽無一物寒光凜凜透虛空無底船船兒無底載清風一任魚龍濯浪蓬八面狂風吹不動和星帶月一船中無孔錘歷劫頻腔佛祖機橫吞豎吐奮全威有時拈出人天驗百雜千重指一揮無星秤我本無星不犯疑四生六道盡含輝一毛頭上知端的大地山河一秤稱無底籃籃兒無底盛虛空攜向街頭糶酒翁笑殺東村沈大伯何年甚日出凡籠原書闕丹霞燒木佛日寂寥兮夜寂寥寒侵木佛火中燒誰憐院主眉鬚墮桑樹傷兮柳樹招如貓捕鼠銅鈴鐵眼個貓兒覆去翻來一塊疑鼯鼠縱有窮妙計輕輕覷著膽魂迷臨濟四喝一喝金剛劍吹毛萬象難將正眼瞧佛魔到此休擬議凜凜寒光迫九霄一喝金毛咂地時聞知百獸也攢眉哮吼震時芳草碧象王行處絕狐疑一喝探竿影草時人天魔佛盡已知縱使銅頭鐵額漢到來覷著也攢眉一喝不作一喝用擬思量處隔千重莫向計中陳玅計一法通時萬法通世尊初生堪笑曇瞿始降生指天指地獨稱尊當時若遇雲門老直至而今禍不生趙州狗子合掌當胸嘆善哉韓盧搖拽舞三臺待渠張口吞佛祖六律五音韻不回父母未生前本來面目風生古殿月迴廊子夜雞啼露結霜一顆圓明無向背虛空開口莫收藏萬法歸一一毛頭上知端的大地原來不是塵薦取祖師關捩子虛空背上豎乾坤示偈一劍直歲倚天一劍萬峰寒立逼銀山當下穿豎起脊沒高著眼悟來只在剎那間文雅書記己躬下事絕思量切莫依稀錯承當二六時中著眼覷品藻原不是雌黃翀石副寺痛念無常立志參腳跟下事爾常拈從來白飯是米做鹽醬鹹兮醋味酸崑劍監寺太平無事樂清彝錦水潺潺滴澗西好向青山深隱隱雷鳴天外好騰飛圓月香燈河北佳聲韻八埏時清道泰慶堯天新羅國裏香風拂吹落闍黎鼻半邊得珍殿主呈書俯拜別吾儕此去深山任活埋踏破嶺頭剛石卵自家寶藏豁然開慶雲茶頭爾能造化變陰陽冷熱溫和任主張洗盡枯腸無一物趙州滋味與天長正修米頭負舂總是佈精微生怕閒消日用時但把身心齊放下碓房走出赤斑蛇國一侍者參禪一定要心空火裏蓮花耀日紅㘞地一聲心膽碎縱橫何處不通風六瑞行者冷眼傍觀爾若何依稀隨例懶蹉磨眼前光陰花費了兩鬢添絲悔後麼朗徹監收參禪學道要心堅剔起眉毛莫放閒相侍老僧十數載始終滋味無兩般聖制行者慇勤奮志休貪眠打起精神莫放參好向己躬親下手銀河玉浪佇朝元寶池行者皎月當空映寶池森羅萬像盡含輝若還當下知端的青山綠水兩無疑居一法孫潮音寺裏香風暖蘇坡橋下浪泊天昭覺一枝無孔笛五音只和太古前自成戒徒峨眉山月照錢塘子夜星移大地霜八萬行門俱靠倒普賢獅子吼上方天聞禪人腳跟下事悟為佳習誦虔躬禮法華莫把寸陰虛度了青年正好泛三車慧滿戒孫鎣華山水勝清奇聳翠層巒插碧虛未到山窮水盡處看來總是半途歸提封禪人照祥徐步緊提封念佛分明具六通馬駒禪堂分付汝清規從此效前雄恒璧禪人恒璧固如眼底珠一歸何處薦真如吹毛寶劍親拈舉大地山河一掌抒月輪禪人月輪何處不光輝親未生時誰個知面目本來無一物自然各去播諸薇覲顏禪人咫尺圓勳復覲顏天顏茲在百雄潛西來大意分玄要乾屎橛兒直萬錢一觀禪人一觀淨月露長天父母未生實可憐只下相逢休外覓天然湧出一枝蓮廣智禪人廣智多聞念佛強不如鍵口密閒藏祖師巴鼻誰人識昭覺爐頭一段光巨明禪人巨明滄海能歸一不得玄時必得玄昭覺爐頭親鍛煉好將春色利人天大智禪人大智能通佛祖禪趙州狗子驗人天白蓮池畔香風起吹殺闍黎鼻半邊大慈禪人大慈大悲憫眾生父母未生一著清翠竹黃花親眼視本來面目自家親遍恒禪人青石頭兒也遍恒大家吹滅暗中尋丹山瞎虎眉生角萬法歸一一掌平參微禪人參禪參到參微處始信從前憶路乂探得眼中頭角現自然滋味等河沙立志禪人如何是佛佛阿誰薦處分明要的真立志一番勤苦學自然滋味與人平圓明禪人薦出圓明柏樹子偷鈴人是解鈴人趙州公案分明舉只恐兒曹不識真明鏡禪人當臺明鏡照中天北斗橫身莫半邊大好向前雄一步篾條穿起祖師禪雲波禪人金剛圈子驗雲波不得隨流把日過笤帚柄兒親指示他年方入鳳凰窩自安禪人自安何必問家安萬法歸來卻是禪探得龍潭紙蠋句拈來猶許個中難衢衡禪人嘉州大象口喃喃銕額銅頭也叫穿若是個中人自忌不須鞭逼上長安一悟禪人一悟為嘉悟一嘉三玄三要步三車如何是悟非為悟直下番身始作家推雲禪人推雲見日實奇哉大意西來汝莫猜但得其中些子處不分星夜省吾儕大願禪人大願三生當自明一生念佛種來生身心不做些兒夢印證方知未了因東傳戒徒靜夜挑燈寫贈文波羅提戒好追尋果然悟卻無生理啟後承先定屬君九天通雲九天高處必通雲出窟獅兒奮志行透卻上頭關捩子當陽一喝嚮如磤碧空法孫參禪學道要心堅放下身心用力參㘞地一聲紅線斷翱翔直上九重天晗輝侍者親遭毒手侍吾前百折千挫志一堅今朝辭別老僧去好將佛法去流傳定水開士海清水定臥龍眠頭角崢嶸躍碧川直下點開霄漢路雷揮電捲一時間性壽徒孫西來大意本天然祖佛家風處處宣父子略具蟭螟眼一花五葉遍人間性權徒孫此子生來志性堅朝參夕課禮華嚴萬年一念如今日裕後旃檀許汝拈清海沙彌河清海晏樂陶唐王化雍熙百代昌子亦生來逢盛世休將錯過好時光機慶玄孫機慶三生誓力堅時殊世異不同前萬年一念如今日許爾法門接半肩常經孟居士梁燕紛紛三月天花香春暖暢於便傾心直下求歸向昭覺門庭要子肩常溥莊頭一念諄諄學老誠虔心侍座甚慇勤莫將寸陰閒過了早種高梧宿鳳林樂天李居士吾老朝朝坐夕曛蒼岩下視一溪雲一聯佳興逢知己且向須臾摘句分佛事為囪門和尚起龕松風慘慘林鳥悽悽石火電光覷之不及禪翁昨夜已西歸三腳驢兒緊著錐烈燄光中騰碧漢不生滅法讓阿誰為懸珠禪人起龕歷遍天台更遊燕南州不住到松潘於斯撒手還家去今日出門值雨天急須去莫留連木馬頻嘶芳草地丙丁童子對渠言舉火踏遍錦江吾不識汝住老松潘渠不識我昨度禪房話片時今朝乞吾一把火直承當休避躲八萬四千功德聚願汝急時成正果舉火虛空拍拍韻還鄉九九餘翁一電光過量大人今已矣方稱敏手過蘆江拈杖指龕云此是落翅孔切莫露鋒芒撒手那邊千聖外銀山鐵壁絕商量以火炬打云鐵牛口裏黑煙生三腳驢兒就此行好把眼光收挕住優曇花裏現全身遂擸起襯云蒼顏雪鬢個頭陀九九齡餘韻蓼莪今把絲綸收挕住悠悠且唱涅槃歌涅槃歌閒觀綠水繞山阿老禪那會也麼生滅既滅寂滅為樂寂滅以滅有何不悅撩起便行莫管南北以拄杖指襯云這個聻常寂光中鑒遠心白雲山裏膺巢穴入塔末法淋漓實可傷潸然拙句鑒衷腸禪翁面目分明處林鳥溪聲共泣揚恭惟太虛和尚坐斷兩頭當陽顯露化緣已畢示涅槃樂今日是我恒明大士深恩厚德水木難忘建窣堵波安厝師骸飛簡至昭覺敦請續頭陀作入塔佛事到這裏向起口不得處一一露出我太虛和尚末後一段風光顧眾云大眾且道是那一段風光拈杖指塔戶云天幹律音成寶所地凝七級瘞牛眠剎竿直向此峰豎萬古標名樂自然便入為法叔問潮和尚起龕云潸然吾叔棄雲堂悅豫心傷送夕陽老恨慈舟幡影折獨憐紅日墜山崗恭惟老法叔運悲心於末世之中斬荊棘於五濁之際八十餘年本色道底以拄杖指龕云木馬嘶風遍大千鐵牛吼破萬重關須彌頂上翻波浪無相光中駕鐵船舉火拈火炬打云鐵鷂摶空金聲擲地這邊那邊一無回避老法叔休疑議輕輕放下閒家具悠悠直上涅槃山維摩室裏閒遊戲遂擸為蓮生老宿起龕云七十餘年事忽爾一旦灰這個臭皮袋秪用一堆柴即須去莫徘徊撒手那邊千聖外休教留落在塵埃舉火以火炬打云阿呵呵七十餘年個衲僧今朝一著甚分明這邊那畔無拘束鶻臭布衫脫得成為浣月尊宿起龕秋風滿院落日沉西這個消息有幾人知擺脫塵勞直下便歸以拄杖指龕云還有這個聻仰煩大眾送汝一程為雲白茶頭起龕七十八年住世間燒茶換水結人緣今朝撒手還家後不知那裏是長安雲白長老還識路頭麼擊龕云杖頭引得清風起少刻紅蓮遍大千舉火青山綠水西來意翠竹黃花古佛心林鳥悽悽傷往事祥煙靄靄駕慈雲聊將拙句酬辛苦時拈拄杖驗精神雲白何必疑來去一回煆煉一回新為演山徒起龕十五日前不生十五日後不死今正十五日生死到來撩起便行且道不著生死關一句作麼生委悉遂拽龕云東關門外青松嶺畔舉火松潘不住住錦江錦江不住便回鄉即須去莫徬徨不可狼籍在他方以火炬打云與子道個末後句回頭休戀火中央為超然尊宿起棺云曲盡詞窮本寂寥個中消息赤條條青山綠水還如舊轉眼娑婆又一遭意上座莫辭勞直不薦取歸根竅棒頭點出金剛眼始知生死不同條既不同條說甚一遭兩遭以拄杖擊棺云與伊指個安身處青山綠水任逍遙為自惺大德舉火咄這個關頭太險自惺今日了然一塵不染威音外萬劫都消烈焰前昨夜碧天雲散盡今朝清霜徹骨寒若還於斯親見得輕輕擊碎上頭關且道這個關頭是甚麼閒家具於此薦得不妨請行脫或未然老僧火炬與伊露個消息咦一腳踏翻生死海掉身別是一家風遂擸為洪湛禪人起棺來也恁麼來不挂一絲去也恁麼去一絲不挂來去赤洒洒未免成墮話秪如出門一句作麼生相委以拄杖擊棺云起為性佑禪人起龕運水搬柴已四載今朝脫卻臭皮袋這邊那畔任遊行從此了然無罣礙既無罣礙行處行來在處在慈和大師請化骷骨師云髑髏遍地不忍看行人積聚如丘山今朝幸遇中元節各各能生火裏蓮還委悉麼脫或未然今日乃赦罪之辰行僧慈和請山僧為汝有情無情一切生靈舉揚般若令汝等一一化生西方去也遂擸火炬云六道四生從此去善惡分明恁縱橫為舟海禪人舉火重陽九月菊花香抖擻精神返故鄉欲識途中親切句紅爐焰上電飛光急須去莫徬徨撒手那邊千聖外回頭休戀火中央為白衣庵太虛和尚起龕拄杖芒鞋到處喃傾心法雨洒南閻滹沱法道湮淪久一段真風繼法筵所以擲地金聲始覺從前是錯摩霄伎倆不期翅落虛空恭惟太虛和尚全身放下兩袖清風住世八十六齡一生玉潔冰清眨眼峰含翠月依稀電閃長空若據此事更不相關且道亦任來去自由是甚麼人境界以拄杖指龕云這個聻舉火云一二三四五打起禾山鼓六七八九十樂奏無孔笛十九八七六齊唱還鄉曲五四三二一大家在這裏以火炬打圓相云北斗藏身處峨眉月上弦夏至三庚後遍界火生蓮遂擸起龕云法兄七十古來稀又得餘齡也大奇阿呵呵也大奇露柱吹笙藏北斗燈籠拍板入南支老法兄雖則任麼瞥地要兩得相應顧眾云五蘊山下活埋菴斜挂孤燈月一圓照見未生時面目翻身直上佛頭眠以拄杖作揖勢云起入塔云窣堵波上還水秀黃金骨地廓天欄大白牛兒就此眠一花五葉遍人間老法兄生滅已滅寂滅為樂以拄杖拍櫬云這個聻便入為有堂門人起龕云拭杖芒鞋至錦關一聲兒哭一聲天太平寺裏閑家具只見遺形不見俺天老眼紛紛淚羅灣只望曾子養曾晢誰知顏路哭顏淵天此去再來吞佛祖赤手扶起破沙籃兒莫辜老僧臨行句火爐頭畔冀團圞以手拍龕云天生不到死不到古人徹底風浩浩又拍云天不到不到真不到駕起摩空鐵鷂兒一翅鵬摶天下曉舉火云金佛不度爐木佛不度火泥佛不度水且道真佛向甚麼處安身立命吾徒有堂也消得這箇隔子麼脫或躊躇老僧火爐頭略較些子拈火炬打云甲子乙丑海中金丙寅丁卯爐中火收攝眼珠歸去來賢劫位中添一朵遂擸為太平昆劍禪師起棺云花神念一午入城打口鼓太平昆上座切莫從頭數六六三十六五五二十五木人把板雲中拍石女含笙井底舞阿呵呵苦苦苦拈拄杖擊棺云五十四年一任卜度舉火云金烏飛玉兔走海底泥牛啣月吼悲風生淚雨落雲中木馬號淘哭薦舉太平昆上座漫道人前六九數以火炬打云死木頭活鵲兒翻身直向來時路拈火炬云丙丁童子笑渠言烈燄光中從頭悟遂擸
