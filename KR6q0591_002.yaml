body:
  text: 嗣法門人正義彌佑編結制上堂搖唇鼓舌拔龜毛於鐵牛背上敲空遺響截兔角於石女腮邊擊石火閃電光毗盧頂上拋三放四騎佛殿出三門糞草堆頭摘葉尋枝坐斷當陽權衡聖化周天地之爐韝廓示真如旋日月之鉗鎚智鑑高恢斬荊削棘鑄聖鎔凡使盡大地有情息無諍三昧接最上乘根器續佛祖經綸全身擔荷豈容朕迹向這裏薦得參學事畢脫或躊躇休將鶴唳誤作鶯啼山僧則不然向第二義門與諸人打葛藤去也周旋天地烈通紅日月星辰掌握中兔角杖鞭山海竭龜毛純繫樹頭風冬至上堂問春生夏長秋收冬藏四時遷變且道西來大意還有遷變也無師云任從滄海變終不與君通進云上無佛道可成下無衆生可度且道本來面目向甚麼處安身立命師驀頭一棒僧擬議師連棒打退乃云威鳳山前解打鼓白蓮池畔唱巴歌吾儕久向龍門餌直釣鯨鱗入帝都以拄杖作釣勢云有麼有麼若有不妨對衆驗過始得若也未然山僧拄杖子與諸人道破遂召衆云直下點開天地眼頂門躍出驪龍珠上堂問佛身充滿於法界誰解説法師云駟馬橋頭石土地進云普現一切群生前誰能具眼師云石子嶺前寶塔子進云口難開處隨拈起無量人天盡見已師云鷂過新羅問口不開舌不動本參在甚麼處師云還聽堰溪水聲麼進云拘住不散師云聞麼進云用時不亂師云向這裏入問佛在靈山説法十大弟子各歸一所修行意旨如何師云家富小兒嬌進云不是心不是物不是佛是個甚麼師云項下鬍鬚八尺長乃云眉間寶劍袖裏金鎚佛眼覷不見鬼神莫思惟八字打開人天不識一毛頭上現寶王剎香水海中魚龍出聽到者裏吞吐得者迥出聖凡陷虎之機一時驗過縵天網子信手羅籠且道還有超宗越格不受羅籠者麼若有不妨試出酬唱脫或未然山僧牽枝引蔓去也拈拂子云春風暖春水清風和日暖暢幽情擲下拂子上堂問如何是平常無生句師直上覷進云如何是玄妙無生句師直下觀進云如何是體妙無盡句師震拄杖一喝問靈源滴水非今古萬法融通理自彰夜半長空飛鐵鷂分明一點露真常這個消息還許學人商量也未師云攪空作響梅花點幾知音乃云攪空作響梅花幾點知音正令才行始見一陽萌動錦江波暖換回天地公心潭月澄清照見本來面目朔風凜凜葉落林凋見遠山凍雲靄靄露結清霜徹骨寒無位真人倒騎佛殿佛性狗子坐斷三門鉢盂峰望空啓告拄杖子忍俊不禁點破當頭一竅且道如何是當頭一竅卓拄杖云推開玉戶天關轉撥動機輪地軸搖結制上堂登寶華王座施格外全機握吹毛劍萬里伏尸耀開頂𩕳正眼悉令天人絶迹千差一照萬化皆如爐韝高鎔鉗鎚節鉞鍛大地衆生奮鐵牛之壯志鍊天下衲僧悟自性之心王頭頭合轍法法舒彰人人剖佛祖心肝個個露元初消息只教句裏藏鋒機先活路擘鋤煩惱淨鏟無明剿絶人我掃除翳蔽直下承當虛空血滴昭覺與麼告報還知落處也未顧衆云今日吾徒有堂不昧自心添煤添炭營齋表嚫敦請山僧上堂普同供養且道兩得相應一句作麼生聻踏著即禍生飲水須防噎元旦上堂乾坤作殿日月為門虛空布鼓須彌為槌拈椎豎拂韜略古今運三陽為符印萬象惟新轉六合作兵將斬新條今具如是妙用展如是經綸賓主歷然照用橫施兵隨印轉將逐符行萬里煙霞皎潔十方世界肅清一據獅王天魔絶迹大衆是甚麼人境界佛子住此地則是佛受用常在於其中經行及坐臥且承誰恩力向毗盧頂上簸土揚塵塗污千聖鼻孔衆中還有其相把背者麼不妨薦舉脫或未然山僧頌出斬新條令布雷門一箭當陽萬國寧倒挂藍衫光宇宙山河大地盡回春浴佛上堂寶磬鏗鏘舉人天會聚時須彌香一炷日月燭二枝以此現前物供養釋迦文惟願光不夜年年亦如斯老瞿曇懵懂不少禍及今時遠孫真續則不然塵説剎説亦無間歇總出不得者個圈圓諸人還信得及麼顧衆云昨夜明星燦紫宸祖孫特特共生辰藍田種玉須真種大地兒孫照樣行錦城太平寺監院海金率血盆會衆善請上堂入纏垂示斬無明拄杖隨身任縱橫祖佛來時三十棒虛空敲得血淋淋償佛祖債玄機密運結衆生緣大展綸音逢場作戲鏗鏘人天號令對境忘情揭示衲僧巴鼻現大人相山河大地轉正法輪示法王身明暗色空合談般若淵溟在處攪長河為酥酪海島逍遙變大地作黃金不遊地獄悉露本地風光不住人天了證無生法忍人人現本來面目個個悟拈花的旨佛日光輝振頽風於末運法眼精明懸赤幟於當陽覺天空湛莫藏身處沒蹤迹心月孤圓沒蹤迹處莫藏身所以無味之談塞斷人口且道是甚麼人履薦靠拄杖云今日是我錦官闔會衆善詣太平寺啓建血盆勝會供佛飯僧虔請山僧登寶王座演伽陵音默豎柱杖召衆云大目犍連尊者同十二類衆生在山僧拄杖頭上安營札寨放大光明一時成佛去也大衆還見麼若見四生九有承恩力八難三途脫苦丘脫或未然借山僧拄杖子鼻孔出氣去也復舉東印土國王請般若多羅齋次乃謂曰諸僧皆轉經惟師為甚不轉經祖曰出息不涉衆緣入息不居陰界常轉如是經百千萬億卷豈止一卷兩卷師云般若多羅尊者秪是個䁆黑豆老漢有甚了期有人問昭覺諸僧皆轉經長老因甚不轉經只對他道默而識之且道與古人相去多少還有優劣也未顧衆云獨自舉頭天外看思量誰是個般人中元上堂掀翻海嶽娑婆擲向他方撥轉乾坤須彌悉歸芥孔天回地轉草偃風行歷歷明明絶無回互赤灑灑直下承當頭頭上顯物物上明拈一莖草現丈六身吹一布毛傳正法眼藏縱使千聖出頭來不敢正眼覷著所以道我宗無語句實無一法與人當下知歸入林不動草入水不動波三世諸佛同一鼻孔歷代祖師把手並行文殊普賢猶是他奴鶖子目連截舌有分到恁麼時節萬象不能藏覆千聖無以擬論一據獅王伏尸萬里大衆還見昭覺落處麼向者裏薦得種田博飯運水搬柴一生受用不盡脫或依稀不妨與諸人下個注腳遂拈拄杖云見麼卓云聞麼於見聞處真見真聞是我真玉居士數十年於昭覺一段光明人天衆前不妨奇特脫或未然山僧頌出恩大難酬恩大難一毫頭上露倪端靈山有約堪承受千古佳聲億萬年邛州金鉢寺門人彌佑彌願等請説戒上堂祖風遠邁佛道難遭正令全提群魔膽裂巍巍乎八方大有蕩蕩乎四海無疆樵歌牧語句句吐佛祖心髓白棒粗拳卓卓開人天正路孤明不昧湛寂非遙所以凡聖同源古今不易無物不為妙用無法不是真乘光揚佛日耀古騰今智鑑無痕道處拈鎚豎拂靈明迥徹亦任法爾如然不心不佛赤條條而千峰獨露幡動風動明歷歷而萬水不沉鼻祖西來惟傳一心之法梁王不識更有斷背之能頭頭上露法法上彰一處明百處千處光輝一言通千言萬言透脫到此腳跟點地廓步大方智眼圓明照耀天地騎聲蓋色直下了明真性超佛越祖露出本地風光不受寒暑豈屬變遷到者裏山花野鳥盡談般若村歌社舞共話無生處處闡毗盧戒藏在在示梵網準繩雖然如是也是徐六擔板山僧則不然向無位真人道還有話會也無顧衆云天雨四花呈瑞彩地搖六振起雲龍傳戒下座中秋授法光上堂曉霜籠玉樹夜月燦瓊枝斷背安心法何須眼畫眉橫身當宇宙一鏃定乾坤拓開千聖宅掀翻舊日程萬里山河添瑞色一天星月佐璇璣昭覺與麼告報只要諸人證明且道透網金鱗以何為食遂拈拂子云夜靜水寒魚不餌滿船空載月明歸結制上堂毒鼓當軒虛空側耳爐鎚高建佛祖心寒者裏豈敢囊藏頓使天魔絶迹瓦礫堆頭現出百千三昧選佛堂前舉揚末法津梁淨裸裸無位真人迎來送去赤灑灑現成公案亦任拈提縱饒鐵額銅睛到者裏個個退身有分正恁麼時有不露鋒芒能征貫戰者麼卓拄杖喝云孤明一鑑皆驚駭真勝還歸掌握中元旦上堂木正蓂調梅花泄未兆之機蒼精點翠緑柳垂不假之金三陽開泰萬象回春八方歌大有之亨四海祝無虞之慶處處歡歌社舞家家瑞氣盈門萬彙齊彰千祥集萃妙議中無量妙議殊勝中百千殊勝盡大地一團和氣等虛空融歸實際且道新年頭佛法還有虛實也未召衆云一氣不言含萬象萬靈何處不無私虛空昨夜知端的大地山河越樣期本師老人三周登座問昔日寰中獨步雲門露出鋒芒鋒芒則且止獨步是如何師以拄杖卓一卓進云拈起花枝一笑至今遺下文章如何是鳳山春色師云心傷獨淚江天月進云日午當天曬林鳥鬧聲喧正恁麼時先老和尚面目即今在甚麼處師云泣恨衷腸慟未伸進云風頭喜天色萬古永流春師云乾坤月樣宇宙三千乃云薄福承恩住祖庭吾師幻化已三春心傷獨淚江天月泣恨衷腸痛未伸吾老人臨滅時召真續至囑云老朽年逾八十哉子宜的的把心開祖翁家業身擔荷莫學癡愚浪蕩呆汝善能保惜中興悟祖門庭吾於常寂光中歡喜無量再索紙筆親書末後偈云新年三日過南洲直踏洋洋東海頭快將捨取珊瑚樹免使波翻浪傾湫書畢端然而逝大衆且道吾老人有甚長處作略如斯真續於爐頭邊親遭痛炙久驗巾瓶今日鼻孔落在薄福手裏且道還許吾老和尚出氣也未遂爇檀片云禹甸悠悠聲價饒天荒地老恨難消仰瞻儀範躬高厚幸托家聲不寂寥解制上堂山城柳色盡含春梅放溪頭暖更生百卉不言湥自肯一番雨露一番新於中有不屬新舊結解者麼拄杖子則不然與伊道破時當九旬期畢三月云終諸禪德一冬於長連床上將生死二字蘊在胸中行住坐臥時時檢點刻刻提撕窮究到言思語絶意識不到處如鼠入洞自有倒斷處敢問大衆即今坐斷凡聖不通酬唱一句作麼生聻昨夜虛空生板齒天明依舊嘴盧都佛誕上堂一言才露千里同風具摩醯眼古今一矚所以發於妙機包羅天地出於妙用融貫十虛眉間挂劍到處逆水興波肘後懸符鞭逼虛空卜度中興祖席鼓黃檗吐舌之風隨緣任運唱哩囉巴歌之曲法運流通佛祖真規烜赫玄機再兆衲僧巴鼻遼天無位真人牽犁拽耙了影狗子攙前捉後且道昭覺有甚履踐作略如斯向他道大人大智豈假摸名豎拂子云老瞿曇不顧頭顱一年一度殃及兒孫續上座隨伊起倒亦任便宜今辰是我通省衆姓同文玉白檀越發帑飯衆珠玉全拋一念無疑這般奇特儼然靈山未散今古分明敢問大衆兩彩一賽作麼生酬唱顧衆云大衆於斯薦得端坐齋堂念佛請齋脫或躊躇山僧與衆頌出白蓮池畔水潺潺龍象雲臨祝壽延不是吾儕多點翠栴檀紫柏一爐煙上堂威鳳林巒吐遠香知馨今日共敷揚靈山有約堪同契大展綸音豎法幢不是神通妙用亦非法爾如然是我宗𠃴大士痛思末運柱石頽綱股肱少室真風輔弼悟祖門庭於誠信諦中一段精微人天衆前和盤托出敦請山僧登曲彔木床打爛葛藤驀豎拂子召衆云菩薩子喫飯來金牛老漢口巴巴地秪道得個汾陽到底續上座普為頌出選佛堂前撾毒鼓錦江城外唱巴歌知音不必頻拈舉無智人前莫亂阿元旦上堂一點靈光輝萬里大千世界明如洗四野河清海晏時無人不在雍熙裏且機樞未露朕兆未分日月未著山川未奠無佛無祖絶見絶聞四聖六凡情與無情承誰恩力默豎拄杖云有物先天地無形本寂寥能為萬象主不逐四時凋是甚麼人境界具如是眼腦遂爇香云八方有道歌王化四海無虞樂太平佛誕上堂問今朝四月初八日釋迦老子降誕之辰諸山合會迎請和尚登座説法有何祥瑞師云一點水墨兩處成龍進云一味之水從空透法雨潤動萬靈根師云生公道底問未離兜率已降皇宮未降之時又在甚麼處師云光映大千遮不住更無一物可追尋進云世尊初生一手指天一手指地和尚誕辰四衆臨筵人天聚會是同是別師云同則即同別則即別進云壽山福海重添算今古同舒不老年師云闍黎高鑒乃云杲日當空乾坤一色心月孤圓萬象皎潔把住則千機寢削放行則人天披閲駟馬橋頭鵬搏鳳舉白蓮池畔風清月白試問諸人把住耶放行耶若無山僧向虛空背上露個關節今辰乃清和之候適老瞿曇嶽降之辰續上座母難之期又僉讚天信官同光佛日飯僧施主福慧莊嚴驀拈拂子且道承誰恩力良久顧衆云堂前不須生瑞草惹得遊蜂嚷舊新解制上堂鑼聲不住鼓聲催柳線牽風雲外來滿堂雲水猿攀樹扁擔腰包緊悄哉若向於此知端的碌砫犁耙笑破腮且道笑個甚麼笑者一夥蛀米蟲東家不飽西家飯捏古捏怪強安排敢問大衆了影狗子還有結解也無於斯薦得分明不妨南嶽天臺闊步大方脫或未然三茶四飯難酬償鬼哭驢年是禍胎元旦上堂八面玲瓏萬里煙霞光爍爍玲瓏八面十方世界赤條條以虛空為宅四生九有盡成歡將日月作炬八難三途悉光明萬象森羅均承恩力蠢動含靈咸叨聖化三陽開泰六合同春堯天舜日共沐恩仁惟我林下道人行住坐臥俯仰屈伸無不承此恩力既然如是且道還有知恩報恩者麼遂爇香云八方有道歸王化四海歌堯樂太平上堂晴雲萬里處處霑錦江皓月瑞氣千尋家家沐四野清風村歌奏無生之曲牧語含太古之音杖頭有眼點開本來面目麈尾藏機拂盡世間孽屑主賓互喚照用分明無位真人迎來顧去了影狗子帶水拖泥薦取鉢盂幾度朝天照顧眉毛覷穿東壁衆中有瞬目揚眉履歷分明者不妨高鑑倘或躊躇山僧與衆下個注腳三條直下訊韓盧不是心兮不是余直下薦取三尺布高懸赤幟任之乎上堂權衡佛祖燮理頽綱人人慧燈爍地個個文焰光天晴雲萬里含劫外之風光雨色交輝潤大千之枯稿掣電轟雷擊翻滄海璇璣左轉括盡埃氛亦任雲橫谷口憑他雪覆青山千江一月孤光獨映於寒潭萬卉同春朕兆全彰於聖世無位真人迎賓款客吹毛寶劍直露當陽古今互換拈來便是佳珍應用隨緣天然不離本有頭頭顯現法法全施正恁麼時還有商量者未卓拄杖云撒手那邊千聖外滿眼牧機盡知音解制上堂今朝正月十五法堂鳴鐘擂鼓山僧解制升堂放出巨獰猛虎雖然這般説話也是無中生有言前頓置殺人腦後日輪當午豁開昭覺門戶拈起生平拙斧一擊頂門現瑞判驗肘後神符報諸公勿踟蹰珍重眉毛當下徹掀翻井底露元初一個男兒一個志那個男兒不丈夫且道別有搏風鼓翅興波躍湧者麼顧衆云駟馬橋頭風浪靜收轉絲綸別下鉤昭覺首座寮秉拂上堂詣座云親承秉拂難以措辭昭覺門庭豈容擬議續上座到來登即是不登即是卓拄杖一喝云有條攀條無條攀例便登拈香云此瓣香光輝宇宙瑞靄乾坤爇向爐中專為祝延今上皇帝聖躬萬歲萬歲萬萬歲伏願皇圖鞏固禹甸錫康次拈云此瓣香色非青黃赤白物非土木石金爇向爐中供養昭覺白雲山中開山第一代上丈下雪師翁惟冀常寂光中佑啓後人再拈云此瓣香威音那畔蒂固根湥今世門頭歲古時新此是真續從誠信諦中拈出供養現住昭覺堂上上佛下冤本師老和尚用酬法乳白椎竟師云雪山突兀一山夫今向人前愧學無佛法本無元字腳承先啓後理皆如大衆還有承先啓後者麼試出道看問發鼓敲鐘尋常事雲收雨積舊時天高提祖印即不問當陽一句請師宣師云待鉢盂峰點首即向汝道進云如何是昭覺境師云庭前二桂參天秀進云如何是昭覺人師云赤眼橫睛耳搭腮進云人境已蒙師指示今日升座有何祥瑞師云獅王哮吼驚天地百獸魂飛烈畫圖進云且道還有施設也無師云古路通兮古路岐乃云杲日當空捉敗五湖衲子皓月孤圓兼收四海獰龍青霄雲外野鶴橫空香水海中泥牛吸浪呼雞作鳳搶天下之𦎗牄指鹿為馬拂世間之孽屑金雞抱子獨棲丹桂玉兔懷胎直向紫宸始知造化根原情同止水天地同根萬物一體使佛祖猶且皺眉攝魔王安敢肆意權提向上正眼難窺雖然如是猶未是向上事且道向上事作麼生委悉遂振威一喝云正令不行先斬首大機一發聖賢悲上堂問三通鼓罷海衆臨筵師登寶座合談何事師云今日又重宣進云從上宗乘即不問如何是和尚三昧師云印破虛空千嶂月洗清天地一林霜進云大海之中波騰浩浩因甚活水不藏龍師云直乘雲勢沖霄漢奮展風輪透碧天進云不死不活向甚麼處安身立命師云待一口氣不來即向汝道僧一喝師打云強作主宰問海底明月現鐵牛當空臥請和尚與弟子説破師云禮拜著乃云知音罕遇達士偏逢人人立地頂天個個如龍似虎突出隨宜受用無非妙行難思如實當機直須自契若則扶掖宗旨不妨叩激己躬故黃檗敲臨濟痛棒一生心死獅子受罽賓之難名列祖圖傳傳有據授授無私英俊衲子臨機不讓通方正眼卻總難窺更向好手手中呈好手紅心心裏中紅心不惟門庭孤迥一且丕振家聲且道全提正令一句作麼生委悉卓拄杖云直下點開天地闊山山梅樹發新英上堂問大地平沉虛空粉碎還有説法處也無師云有進云如何是和尚説法處師云昨夜碧天雲散盡今朝清霜徹骨寒進云出群須是英雄漢敵勝還他獅子兒師震威一喝問如何是今日事師云照管話頭進云如何是即此事師云墻壁瓦礫進云如何是離此事師云落眼成翳進云非離非即時如何師云優劣分明乃云大道廓然如太虛空祖師心印壯似鐵牛若具上根利智直下承當全身擔荷不論通宗透教以悟為期盡力匡扶如塗毒鼓受椎聞之者則喪不旋踵似太阿鋒出匣逢之者則死不移時據實判驗丕振宗猷具如是韜略敲空作嚮示本色鉗錘拂引清風舉措應緣全放全收山僧恁麼告報還有共相酬唱者麼雖然如是不遇春風花不開花開猶待春風來解制上堂問威音那畔莫可商量今世門頭必須履踐秪如遍地棘栗和尚如何插足師云步步踏著進云昭覺試場已畢東皇節令重新臨行句子請師指示師云切莫東走西走進云九旬禁足百日抽單開龍放鳥如何吐露師云杜宇聲聲喚子規進云棒如雨點喝似雷轟去此二途別有指示也無師云切莫乍明頭進云解制結制即不問如何是龍象蹙額句師云善哉進云如何是藏佛滅祖句師云非汝境界進云如何是呼牛喚馬句師云一任卜度進云如何是定動龍蛇句師云試飛騰看進云如何是把斷乾坤句師云水泄不通進云末後句子即不問大事因緣又若何師云與汝説法竟乃云鐘鳴鼓響解制升堂七尺瘦笻佛祖標榜未明三八九切莫亂商量爐煙結彩杲日呈祥龍象蹴踏雲水滿堂聖制只有茲時在不知那個解承當直指西來無一物太煞分明絶覆藏悟不悟庭前柏子牽羅布徹不徹乾屎橛兒分外別青山緑水任芳妍翠竹黃花都漏泄這事分明個現成珍重眉毛當下徹落霞孤鶩齊飛秋水長天一色結制上堂問選佛場開人天聚會且道所談何事師云今日又重宣進云和尚腦藏六合眼蓋乾坤摩竭正令作麼生行師卓拄杖震威一喝進云具大智顯大用杲日當陽且道是體是宗師云坐斷要津有無不立問爐韝洪開士農工商各歸一業如何是紅爐的意師云任從滄海變終不與君通進云如何是鉗錘的意師云出匣吹毛劍寒光射斗牛進云良將當頭以何火色煆煉師云七花八烈進云紅爐開展鉗錘動鐘鼓交加法令行師云也不消得乃云洪將大冶煆人天鐵額銅頭實所瞻杲日一輪光宇宙四生六道盡承歡且道把斷要津有無不立是甚麼人公案卓拄杖咄云內不放出外不放入九十日中無純自縛戒徒恆識請上堂一陽萌動露出元初消息法令才施轄開人天正眼乾坤左轉日月右旋皎皎星騰碧漢熒熒月映寒潭人人鼻直眼橫個個騎聲蓋色四生九有齊承恩力八難三途共獲清涼且道還有不受羅籠不屬遷變者不妨奇特脫或躊躇山僧拄杖直下承當指出慧明老宿末後一段因果兩得相應去也諸人還信得及麼長至日南添一縷雪裏梅花暗點頭元旦上堂桃符換舊兔角朝天八字打開梅花點額拄杖子赤條條地坐斷先天使盡大地人扶泥摸壁出他圈圓不得衆中有拋三放兩指掌上伏虎降龍的與拄杖子結個同參不妨奇特若也未然續上座不被旁觀從頭著破新年月日與新辰撥火拈香汝重珍昨夜梅花穿鼻孔天明依舊頌花神解制上堂布鼓當軒騎風拂電摩竭令行霧捲星飛伶俐衲僧不妨擔枷過狀通方上士豈在聲色堆頭一處明百千法門無量妙議一一光明直向萬里無陰陽地上種月鋤雲不妨相視若也未然昭覺拄杖以契出氣自勉自勵去也卓拄杖咄云無陰陽地草叢叢種月鋤雲為己躬一點清光吞宇宙蘆花深處自雄雄浴佛上堂榴花吐火錦水羅灣人人眼生蛺蝶個個耳出蜻蜓無位真人在拂子頭上合掌道善哉何以故老瞿曇一年一度水潑頭顱續上座隨伊起倒與諸人頌出毒鼓鼕鼕祝壽筵神圖白澤展堯天一年一度遭湯潑笑破傍觀嘴半邊四十九年三月十八日萬壽聖誕通省文武官員恭詣江瀆祠啓建萬壽道場告天祝壽恭請上堂至座前云寶華王座獨露當陽到即便登有何回互卓柱杖云噁人天標準佛祖規模遂升拈香此一瓣香德配天地道貫古今篆則光凝宇宙薰則瑞靄乾坤舒之越量爇而為雲爇向爐中祝延今上皇帝聖躬萬歲伏願帝德巍巍四海祝無疆之壽皇風蕩蕩八方歌大有之年三千界內瓊樹恆時鬱茂萬象之中石筍不夜抽條安如盤石壽等岱衡躬祝皇太子殿下睿算千秋親王世子大內天眷展堯天之大業變舜日之清機普覆群黎萬邦樂業此一瓣香奉為滿朝文武公卿本省當道尊官惟願壽位廣如滄海高比嵩嶽時時忠勤王室處處啓迪法筵這瓣香白雲山裏樹標赤幟爇為宋圓悟禪師明破山老人清丈雪師翁本師佛冤老和尚普願於常寂光中素轉無生法忍乃云錦江波暖喚回天地公心雪嶺風清吐出乾坤正氣孤峰頂上龍吟虎嘯黃金闕下鳳唱鸞鳴揭開萬縷香雲放出光天化日臣僧真續朽質微軀芒鞋鈯斧不顧危亡於斯建立天童宗旨闡揚昭覺門庭高啓先天爐韝平匡不老仙機八字打開無量壽佛現也大衆還見麼若見不勞真續説法祝釐脫或未然今向麈尾略露些子遂爇香云上酬一人之深恩下資群臣之垢業壽域弘開普天同慶且道樞機未露朕兆未分日月未著山川未奠無佛無祖時又作麼生驀豎拂子云有物先天地無形本寂寥能為萬象主不逐四時凋是甚麼人境界顧衆云佛心聖主佇真人之至化兆大法之中興明如杲日寬若太虛當此之際君恩深似海佛性等須彌遂於懷中出香兩手捧爇云但願法筵長不夜欣瞻聖算樂無疆下座伍十一年七月望六日皇肆子和碩雍親王命許大護法代掃圓悟老人塔請上堂拈香問答畢乃云打口鼓唱哩囉五百餘年調復初一柄钁頭不請友鋤雲種月薦己躬披簑頂笠田間朽拙斧芒鞋林下疏每逢聖節酬高厚柏子氤氳透九重屢仗宸恩施亭毒全藉鹽梅贊化工即今兩彩一賽句子作麼生酬唱遂爇香云九重高處藉旃檀柏葉芬芳遍大千濟北宮商歌舜日東山鐘鼓祝堯天下座甲午歲清和日上堂問答畢乃云也大奇也大奇榴花堆疊上瑤池打動禾山築築鼓大家共韻百齡詩也大奇也大奇堤柳青青枝正宜田郎頂笠田塍望蠶姑摘葉大眠時也大奇也大奇唯我林下道人癡日飽兩餐瓔珞粥管甚門前是與非也大奇也大奇省會營齋飯衆僧鐵酸餡兒橫吞吐亦任汾陽飯鐵釘也大奇也大奇翁孫懸弧受信施一年一度遭湯潑拖拖扯扯到幾時也大奇也大奇團圞石上萬指餘道道東村王大伯這樣人家世罕稀咦下座自咨日提臺韓公藩臺宋公臬臺石公同宮善石泰楊璟宋真玉潘朝恩王琪麟淨超常印德綺李得捐金重新梵剎繪塑金像功德圓滿薰修盂蘭勝會請上堂云金風生肘腋玉葉向扁舟客燕青霄語賓鴻雲外飛牧童問道何以故全身草一蘆麟趾鳳毛穴鹽梅贊化功人境分明也照用一機收錦江標赤幟虛空列畫圖渠農高著眼御額佇宸樓即今翬飛鳥革金像儼然落成大觀且道是遠祖的事遠孫的事遂爇香云丈六金身草一莖幾經劫火幾番興吾儕不是呈間管知住須憑過量人下座結制上堂單丁禿木亦任逢場作戲大任權衡勿論親疏絶擇既是家裏人便説家裏話亦任他天來龍來神來鬼來我這裏飽與一頓何以故昭覺門下令不虛行卓柱杖云九十日頭頭已起日南一線又重添闍黎夢破相思後雪裏梅花放鼻尖參拽柱杖下座長至上堂乃云日南一縷莫唐捐嶺上梅花放鼻尖君子不擇仁里厚時人得得望高攀九九三三三九九拖拖扯扯八羊欄兔角回紋分袂也不知那裏是長安咄庚辰戊戌準一百五十天參下座元旦上堂乃云春王正令斬新條日暖風和共祝堯無位真人間相識不知新舊樂餘朝春風暖春日融風和日暖唱哩囉春山秀春水緑大地山河活潑潑惟有東村何首烏年年月月不出土阿呵呵會也麼駟馬礄頭石碑子口口聲聲道相如可憐不遇知音者收拾犁耙務春禾喝一喝下座解制上堂問答畢乃云三敲禾山鼓九撞卜地鐘堤畔柳眼青庭前梅花馥山僧柱杖子亦任人顛撥從今解制去東卜與西卜卓柱杖咄云卜卜卜下座佛誕曰上堂乃云峨眉月聖燈錦江水酌茗以此窮孝敬供養釋迦文酬不酬之德報不報之恩遠孫逢母難此日亦如斯大衆老瞿曇還來享祀也未今辰邑侯周護法仰酬高厚賑濟寒林應宰官身宣行王化山僧現宰官身而為説法兼真深楊護法酬恩謝嗣寄保金田通省衆會營齋表嚫供佛飯僧數彩一賽共打葛藤是則也是要大家知解且道知個甚麼顧衆云燈光七級演摩訶廣嗣延生福壽多供佛飯僧同此日儼然一會又重過下座中元上堂乃云吉祥草能縱能奪能殺能活有時十字街頭貴買賤賣有時虛空背上剜肉成瘡拈一莖盡為床座鋪一葉悉為茵褥令一切衆生蜎飛蠕動盡承恩力不妨與長者結個同參亦任奇特脫或躊躇山僧柱杖子與大衆打葛藤去拈柱杖卓一卓喝一喝云一葉落天下秋一塵起大地收好笑村西以手打云伯誤將細為茵褥阿呵呵好大奇喚卻多少人骷髏咄咄咄下座結制上堂乃云一年一度始開爐爛鐵頑銅一概收百煉千磨分正偽個中消息自容通此家事先老人和盤托出交代山僧一狀領過荷擔數十餘年應如是住近來有等間神野鬼將佛祖化門販賣不堪即今聖制到來豈肯坐消國食唐突時光山僧依款具令結納諸方衆中有商量者麼不妨奇特脫或未然山僧自起自倒去也咄云九十日前容易過開籠放鳥自飛難喝一喝下座上堂十一月初一吹起無孔笛掉棒打三才虛空血滴滴面南看北斗梅眼泄天機翠竹與黃花祖師西來意遠祖云有物先天地無形本寂寥能為萬象主不逐四時凋古人吐露大似明鏡當臺伏尸萬里昭覺則不然與柱杖子露個消息有知委者不妨相視柱杖子咄云錦里鐸聲揚四海鳳山春色占三巴勺公一破堅囊後笑倒汾陽薦處差下座淨土法叔和尚掃祖塔請上堂云祖席披荊整舊林今承法叔輔中興趙洲八十遊行腳老叔期齡祀祖庭以拂子打圓相云諗老人來也大衆還見麼若見不勞昭覺搖唇鼓舌豎拂拈鎚脫或躊躇昭覺借老法叔鼻尖與諸人露個消息大衆今朝是我法叔明老和尚上祖庭祀掃吾祖丈老人窣堵波寶塔設齋飯衆命昭覺上堂不得已借婆帕子拜婆年以酬叔侄共話無生遂拈香云八百花神祀祖堂一線一酌一爐香真誠不是小兒戲常寂光中是遠香咄香下座除夕上堂桃符一易一番新獸炭爐中紫焰頻爆竹聲喧歌舜日垂衣而治頌堯宸下座元旦上堂履端伊始萬物維新惟有個事不論疏親且道應時即節作麼生知委新年新月及新時舊裏工夫定不移撥著上頭關捩子一毛頭上納須彌下座解制上堂火樹輝煌衲子眉毛𨁝跳銀燈燦爛山僧柱杖撩天人境分明主賓互換向者裏會不妨疑著脫或未委韓盧逐塊是則是夥帳分明任抽單但打不咱驢年未得清算召衆云長連床上兩年頭清水白米事事周若個知音甄價重和盤托出任風流下座上堂孽債犁耙不歇心老當益壯輔叢林拈鎚豎拂分玄要殺喝權施佛祖機即今爐韝高設期會弘開有不被鋒芒袒胸露背者與柱杖子結個同參亦任音特脫或未然昭覺柱杖不被傍觀自倒自起去也遂卓杖云堂前鐘板驗人天薦取諸人鼻孔穿拐杖釘靴勞緊管乾巴巴地是長安復卓柱杖云參下座佛誕上堂威鳳山頭豎剎竿鼕鼕打得四洲圓呵呵笑倒傍觀者吃飯穿衣自了然顧衆云五十六年個賊卻被瞿曇識得翁孫兩個不羞一年一度遭厄今被諸公敦請問我家常醜拙人天衆前吐盡莫與諸公辨白有麝自然知香無風水底見月只在搬磚運瓦不會與人解牒問取西來大意碗底箸頭親切有時喝佛罵祖有時自救不得瓔珞粥兒三個飽亦任閻公來打帙下座結制上堂問答畢乃云中興祖席念年零百煉千磨受苦辛今日大觀重復古高懸赤幟驗天人即今聖制臨筵鉗鎚節鉞不被淒風苦雨寒暑蹁躚者於斯開單展鉢豎坐橫眠三條椽下七尺單前珍重腳跟照顧眉毛與無位真人結個同參親到昭覺始得衆中有不入群隊別露鋒芒者不妨高薦脫或未委暫時不在如同死人昭覺道打麵還他洲土麥唱歌須是帝鄉人下座長至上堂乃云披雲出谷涉前溪卻聽林禽四野啼日暮歸來仍舊裏衣珠下事幾人知六十餘年鐵蒺藜惟有今年分外奇石頭瓦礫盡含輝瓔珞粥淡黃虀一任飢人飽撑撑碌砫犁耙微微笑可憐不覺又陽生下座元旦上堂春王正月透新條薦出元初律呂調大地河山增瑞色嶺南春信藉吾朝下座解制上堂燈光燦爛普光明佛來也驢鳴犬吠觀音菩薩現前村歌社舞處處歡呼樂飲野老聲喧家家送去迎來無位真人扶籬抹壁咬影狗子帶水拖泥惟我林下道人不問四時貴賤亦任飽餐何以故閻居士契書攢花簇錦知委者不妨限數即今解制抽單作麼生清算顧衆云鉢盂無底口朝天昭覺堂前驗本參今日分明清帳也扁擔橫吞四海緣下座結制上堂乃云中興祖域萬年爐爛鐵頑銅一概輸陝府鐵牛血汗滴嘉州大象嘴盧都所以云三年無改於父之道祖禰不了殃及兒孫今值信官廷柱楊常襲不昧靈山公券砫石沙盆虔捐清俸得得來山供佛飯僧敦請山僧結制上堂斬七十餘代之葛藤調百千萬種之佳音亦任胎卵濕化蜎飛蠕動不被寒暑蹁躚者不妨於斯開單展鉢豎咽橫吞普同供養脫或未委山僧自調自唱去也顧衆云赤幟高標不幅長任他風雨四時揚單丁獨力超群相野鬼間神絶覆藏復卓拄杖云藏下座乙未冬衆門人建壽塔院請上堂云十五日已前撩天拄杖撑皓月無底鉢盂盛青天十五日已後無情眉毛橫額上偷鈴掩耳搭腮邊正當十五日到來天花六出成梵網地産靈芝結鳳毛且道是遠祖遠父遠子遠孫的事是老僧末後一著瘞藏朽質遠利諸公的事向這裏親切得出不妨再道脫或未委一偈頌出續住祖庭數十年愧無一德仰龍天只因不負先人托固有承先啓後賢藉願慧燈同杲日佇希懸識再宗傳萬蓮池畔牛眠穴地枕天衾月一彎下座元旦上堂乃云一元初復始萬象盡回寅桃符懸北闕柳劍倚南宸家家燒獸炭戶戶貼宜春八方歌大有四海樂升平且道承誰恩力遂爇香云元正啓祚萬物乘時一人有慶兆民賴之下座解制上堂乃云鐘鼓鏗鏘驗聖凡明明百草薦三玄腰包布袋牢牢管短杖驚獹越小彎七尺單頭銷舊案三條椽下布新田燈籠起舞言生受碌砫呼嗟應可憐卓拄杖咄云碓嘴頭邊梅花放蛀米蟲兒口上班下座佛誕上堂云好事堆堆疊疊來心心不用巧安排層樓紺相儼然也萬象森羅眼豁開顧衆云且道承誰恩力幸蒙我大中丞大護法率同藩臬憲郡文武宰官喜捐清俸共勷盛舉復古重新中外大觀燈光七級檀越均霑實億萬年不磨之因真千百劫已熟之果合掌道希有希有善哉善哉捧爇檀云恩大難酬爐煙在爇頌云續繼祖庭七八零三生石上遇緣人靈山有約堪培護不昧瞿曇著一丁萬彙咸霑恩惠澤兆民歌遍頌廉清九流百藝深懷德草木昆蟲仰聖恩下座結制上堂乃云霜衣雪鎧十年零孽債犁耙未暫停幸遇祖緣光法席頽綱丕振舊家庭驀豎拄杖云此物包羅天地含蓋乾坤鑄聖鎔凡超佛越祖大啓人天正路廣示真如之理且道爐韝洪開鉗鎚節鉞不被鋒芒能征貫戰者誰卓拄杖云無位真人眼著沙鐵牛口裏吐煙霞木雞抱子來天地亦任風流翠可誇下座上堂乃云三三甫罷又三三凍殺諸人鼻半邊一毛頭上知端的九個三三一串穿諸公於斯親切紅梅香嶺上緑柳放池邊脫或依俙昭覺拄杖子正打傍敲露出先天一段光明且道是那一段光明卓拄杖云八八六十四九九八十一長至寒時節一百五十日下座元旦上堂云春王正令斬新條春日融和按六韜萬象不言深自肯山河大地盡承叨且道拈香祝聖一句作麼生委悉天得一清地得一寧君得一統臣得一忠民得一足衲得一空大衆還識一麼若也未委山僧頌云一元啓旦一元亨仰祝吾皇億萬春但得一中薦得一三陽六合體同春下座解制上堂今歲解制是此日今朝解制是此時三條椽下韓盧惺七尺單前鬼臥尸阿呵呵好可憐清水白米半年零個中若遇知音者依舊梅花笑滿村下座佛誕上堂也大奇也大奇通省來山飯衆緇也大奇也大奇翁孫母難共今期一年一度遭湯潑祖代冤讎理不齊吩咐犁耙與碌砫就水拖泥下苦耕阿呵呵好阿哥忙裏偷間薦珠衣奪得明珠光照夜珊瑚枝上月東移下座上堂云威鳳山頭鐘鳴鼓響昭覺堂前月日風清廓天地為爐韝烹佛炙祖拈日月作鉗鎚鑄聖鎔凡有時拈一莖草現丈六金身示丈六金身作一莖草捲舒互換照用全施亦任諸方於其中間開單展鉢豎坐橫眠清水白米具足飽滿不得向無位真人腳跟下拈香撥火汲水拖柴勞碌草鞋兩頭三處衆中有不受烹炙鉗鎚者不妨與古人結個同參脫或未然山僧拄杖下個柱腳卓拄杖喝云一莖草上現金身無位真人著一丁行住坐眠親薦得百城煙水渺無痕下座嗣法門人如春請上堂云一雞二犬三豬四羊五牛六馬七人八谷九豆十綿從上古人按雙陸如蓮花出水開放新鮮昭覺即不然對人天衆前與蛇添足去也一偈拈出兔尾龍頭雙鳳鳴皇圖龍馬現麒麟韓盧逐塊逢雙象二鼠侵欺嚙井藤兔角杖挑潭底月龜毛繩繫虎頭鈴龍蛇混合同伸慶共祝吾皇壽萬春下座元旦上堂一元復始拄杖戲穿東壁三陽開泰衲子鼻孔撩天明明白草頭明明祖師意衆中有不隨元老不入群隊者人天衆前與老僧露個端的若也未然且聽東郊外鑼鼓喧天是甚麼消息阿呵呵好消息東郊鑼鼓響天地一元元老占春魁昭覺不隨他的意珍重眉毛著一丁咦春風相送南花巖一一露盡真消息下座
